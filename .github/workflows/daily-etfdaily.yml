name: daily-etfdaily-update

# 每日 T 當天晚上抓投信官網當日持股（ground truth）
# 5 家投信 API / 10 檔 ETF，細節見 docs/tools/etfdaily.md
#
# 另一條歷史持股管線（21 檔深度回溯）走外部專用 CI；raw 資料
# push 到本 repo 的 raw/cmoney/ 由下游 site_build 消費。

on:
  schedule:
    # 每個台股交易日 T 當天晚上 20:00 TPE（= 12:00 UTC），週一到週五
    # 投信官網 PCF 大約 17:00-18:00 TPE 齊全，20:00 預留 2-3 小時緩衝
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-etfdaily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Fetch etfdaily raw (5 issuers / 10 ETFs)
        id: etfdaily
        continue-on-error: true
        run: |
          set -eo pipefail
          uv run tools/etfdaily.py fetch --all

      - name: Summary
        if: always()
        run: |
          echo "=== raw/etfdaily（step outcome = ${{ steps.etfdaily.outcome }}）==="
          du -sh raw/etfdaily 2>/dev/null || echo "(raw/etfdaily 不存在)"
          find raw/etfdaily -type f 2>/dev/null | wc -l | xargs echo "總檔數:"

      - name: Commit and push
        run: |
          set -eo pipefail
          git config user.name "marvin-69-jpg"
          git config user.email "274374385+marvin-69-jpg@users.noreply.github.com"
          git add raw/etfdaily/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "chore(raw): daily etfdaily fetch $TODAY" \
                     -m "etfdaily=${{ steps.etfdaily.outcome }}"
          git push

      - name: Open issue on failure
        if: always() && steps.etfdaily.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="daily-etfdaily $TODAY: ${{ steps.etfdaily.outcome }}"
          BODY="etfdaily fetch failed. Run: $RUN_URL

          常見原因：投信官網改版 / API endpoint 變 / 假日發布延遲。
          看 log 找哪檔 ETF 有問題 → 見 docs/tools/etfdaily.md。"
          EXISTING=$(gh issue list --state open --search "daily-etfdaily $TODAY in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open for $TODAY, skipping."
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi

      - name: Fail job if fetch failed
        if: always() && steps.etfdaily.outcome == 'failure'
        run: exit 1
