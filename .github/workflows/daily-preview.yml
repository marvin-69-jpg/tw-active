name: daily-preview-rebuild

on:
  push:
    branches:
      - main
    paths:
      - 'raw/cmoney/shares/**'
      - 'raw/cmoney/meta/**'
      - 'tools/preview_all.py'
      - 'tools/preview_build.py'
      - 'tools/preview_prices.py'
      - '.github/workflows/daily-preview.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # gh workflow run pages-deploy.yml 需要

concurrency:
  group: daily-preview
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write FinMind token
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          if [ -z "$FINMIND_TOKEN" ]; then
            echo "[warn] FINMIND_TOKEN not set, 走 no-auth tier (rate limit 較低)"
          else
            sudo mkdir -p /home/node
            printf '%s' "$FINMIND_TOKEN" | sudo tee /home/node/.finmind-token >/dev/null
            sudo chmod 644 /home/node/.finmind-token
            echo "[ok] token written to /home/node/.finmind-token"
          fi

      - name: Rebuild preview per-ETF JSON
        run: |
          set -eo pipefail
          CODES=$(ls raw/cmoney/shares/ | grep -E '^[0-9]{5}[A-Z]\.json$' | sed 's/\.json$//' | tr '\n' ' ')
          echo "building codes: $CODES"
          uv run tools/preview_all.py $CODES

      - name: Rebuild preview prices via FinMind
        run: |
          set -eo pipefail
          CODES=$(ls raw/cmoney/shares/ | grep -E '^[0-9]{5}[A-Z]\.json$' | sed 's/\.json$//' | tr '\n' ' ')
          for code in $CODES; do
            lc=$(echo "$code" | tr 'A-Z' 'a-z')
            src="site/preview/${lc}.json"
            if [ ! -f "$src" ]; then
              echo "[skip] $src missing"
              continue
            fi
            echo "=== $code ==="
            uv run tools/preview_prices.py "$src"
          done

      - name: Rebuild preview per-ETF JSON (pass 2, now with prices for P&L)
        # preview_build._compute_stock_pnl needs <etf>-prices.json to exist.
        # Pass 1 runs before prices exist (or with stale ones), so pnl ends up
        # None / based on bad data. Re-run after prices are fresh.
        run: |
          set -eo pipefail
          CODES=$(ls raw/cmoney/shares/ | grep -E '^[0-9]{5}[A-Z]\.json$' | sed 's/\.json$//' | tr '\n' ' ')
          uv run tools/preview_all.py $CODES

      - name: Summary
        if: always()
        run: |
          ls site/preview/ | wc -l | xargs echo "site/preview 檔數:"

      - name: Commit and push
        id: commit
        run: |
          set -eo pipefail
          git config user.name "marvin-69-jpg"
          git config user.email "274374385+marvin-69-jpg@users.noreply.github.com"
          git add site/preview/
          if git diff --cached --quiet; then
            echo "No site/preview changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "chore(preview): daily rebuild $TODAY"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger pages-deploy
        # GITHUB_TOKEN push 不會觸發下游 workflow（GitHub 防遞迴規則），
        # 用 workflow_dispatch 繞過（dispatch 是 GITHUB_TOKEN 可觸發的例外）。
        # 參考 feedback_github_token_no_trigger memory（2026-04-21 實戰踩到）。
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-deploy.yml --ref main
