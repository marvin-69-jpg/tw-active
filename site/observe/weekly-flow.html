<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tw-active · 主動 ETF 經理人資金流</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --paper: #fafaf7;
    --panel: #fff;
    --rule: #e0ddd2;
    --rule-strong: #1a1a1a;
    --up: #b8860b;
    --down: #4a7c4a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    background: var(--paper);
    color: var(--ink);
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 48px;
    font-size: 13px;
    line-height: 1.55;
  }
  a { color: inherit; }
  h1 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 20px; font-weight: 600; margin: 0 0 4px;
  }
  .sub {
    color: var(--ink-soft); font-size: 12px;
    padding-bottom: 12px; margin-bottom: 14px;
    border-bottom: 1px solid var(--rule-strong);
  }
  .sub .mono { font-family: ui-monospace, monospace; color: var(--ink); }
  .breadcrumb { margin-bottom: 8px; font-size: 11px; color: var(--ink-soft); }

  /* segment：本週 / 昨日 */
  .seg {
    display: inline-flex; gap: 0; margin-bottom: 14px;
    border: 1px solid var(--rule-strong);
  }
  .seg button {
    padding: 8px 16px; font-size: 12px; cursor: pointer;
    background: transparent; border: none; font-family: inherit;
    color: var(--ink-soft); white-space: nowrap;
  }
  .seg button.active { background: var(--ink); color: var(--paper); }

  /* TUI 卡片，與 /preview/ 盤前指引同款 */
  #flow-card {
    border: 1px solid var(--rule-strong);
    background: var(--panel);
    padding: 14px 16px 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .fc-head {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 15px; font-weight: 600; color: var(--ink);
    margin-bottom: 8px;
  }
  .fc-head .fc-date { color: var(--ink); }
  .fc-head .fc-cov  { color: var(--ink-soft); font-size: 12px; font-weight: 400; }
  .fc-rule {
    border: none; border-top: 1px dashed var(--rule);
    margin: 8px 0 6px;
  }
  .fc-rule-strong {
    border: none; border-top: 1px solid var(--rule-strong);
    margin: 6px 0 8px;
  }
  .fc-label {
    font-size: 11px; color: var(--ink-soft);
    margin: 4px 0 4px; font-family: inherit;
  }
  .fc-rows { display: flex; flex-direction: column; gap: 0; }
  .fc-row {
    display: grid;
    grid-template-columns: 110px 3.8em 7em 1fr 2.8em;
    align-items: center;
    column-gap: 8px;
    padding: 3px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 13px;
    white-space: nowrap; overflow: hidden;
  }
  .fc-rows .fc-row:last-child { border-bottom: none; }
  .fc-row .r-name {
    color: var(--ink); white-space: nowrap; overflow: hidden;
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
  }
  .fc-row .r-code { color: var(--ink-soft); }
  .fc-row .r-ntd  { text-align: right; font-weight: 700; }
  .fc-row .r-ntd.up { color: var(--up); }
  .fc-row .r-ntd.dn { color: var(--down); }
  .fc-row .r-bar  { font-size: 11px; letter-spacing: -0.5px; overflow: hidden; }
  .fc-row .r-fam  { color: var(--ink-soft); font-size: 11px; text-align: right; }
  .fc-nosell { color: var(--ink-soft); font-size: 12px; padding: 2px 0; }
  .fc-foot {
    margin-top: 8px; font-size: 12px; color: var(--ink-soft);
    text-align: right;
  }
  .fc-foot .hi  { color: var(--ink); font-weight: 700; }
  .fc-foot .pct { color: var(--up); }

  .note {
    margin-top: 16px; padding: 10px 12px; border: 1px dashed var(--rule);
    font-size: 11px; color: var(--ink-soft); background: var(--panel);
  }
  footer {
    margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--rule);
    color: var(--ink-soft); font-size: 11px;
  }

  @media (max-width: 640px) {
    body { padding: 18px 12px 32px; font-size: 12px; }
    h1 { font-size: 17px; }
    #flow-card { font-size: 12px; padding: 12px 12px 10px; }
    .fc-head { font-size: 14px; }
    .fc-row  { font-size: 11px; grid-template-columns: 100px 3.8em 6.5em 1fr 2.8em; }
    .seg button { padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="breadcrumb"><a href="../">← 回主動 ETF 列表</a></div>
<h1>主動型 ETF · 經理人資金流</h1>
<div class="sub" id="sub">—</div>

<div class="seg" id="seg">
  <button class="active" data-scope="weekly">本週彙總</button>
  <button data-scope="daily">昨日明細</button>
</div>

<div id="flow-card">—</div>

<div class="note" id="note"></div>

<footer id="footer">—</footer>

<script type="module">
const $ = id => document.getElementById(id);
const fmtDate = d => d ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : '—';
const shortDate = d => d ? `${parseInt(d.slice(4,6))}/${parseInt(d.slice(6,8))}` : '—';

function fmtNtd(v) {
  const sign = v >= 0 ? '+' : '-';
  const abs  = Math.abs(v);
  if (abs >= 1e8) { const n = abs/1e8; return `${sign}${n>=10?n.toFixed(0):n.toFixed(1)}億`; }
  return `${sign}${(abs/1e4).toFixed(0)}萬`;
}

// 兩個 scope 的門檻（週累積數字會比單日大很多，閾值要拉高才有區分度）
const THRESH = {
  daily:  { consensus_buy_etfs: 4, single_bet_ntd: 3e8, consensus_sell_etfs: 3 },
  weekly: { consensus_buy_etfs: 6, single_bet_ntd: 10e8, consensus_sell_etfs: 3 },
};

const sources = {};
async function loadScope(scope) {
  if (sources[scope]) return sources[scope];
  const file = scope === 'weekly' ? '../preview/weekly_flow.json' : '../preview/flow.json';
  sources[scope] = await fetch(`${file}?v=${Date.now()}`, { cache: 'no-cache' }).then(r => r.json());
  return sources[scope];
}

function renderSub(d, scope) {
  const totalEtfs = d.etfs_covered.length + d.etfs_lagging.length;
  if (scope === 'weekly') {
    return `
      <span class="mono">${fmtDate(d.week_monday)}</span> ~ <span class="mono">${fmtDate(d.week_friday)}</span>（5 個交易日累積）
      · 起點 <span class="mono">${fmtDate(d.start_date)}</span> → 終點 <span class="mono">${fmtDate(d.as_of)}</span>
      · <span class="mono">${d.etfs_covered.length}</span>/<span class="mono">${totalEtfs}</span> 家已揭露
    `;
  }
  return `
    as-of <span class="mono">${fmtDate(d.as_of)}</span> vs 前日 <span class="mono">${fmtDate(d.prev_date)}</span>
    · <span class="mono">${d.etfs_covered.length}</span>/<span class="mono">${totalEtfs}</span> 家已揭露
    · 涉及 <span class="mono">${d.totals.n_stocks_touched}</span> 檔個股
  `;
}

function renderCard(d, scope) {
  const card = $('flow-card');
  const t = THRESH[scope];
  const inflow  = d.inflow  || [];
  const outflow = d.outflow || [];
  const totals  = d.totals  || {};
  const byEtf   = d.by_etf  || [];
  const covered = (d.etfs_covered || []).length;

  const consensusBuy  = inflow.filter(s => s.etfs_buy  >= t.consensus_buy_etfs).sort((a,b)=>b.ntd-a.ntd);
  const consensusBuyCodes = new Set(consensusBuy.map(s => s.code));
  const singleBets    = inflow.filter(s => !consensusBuyCodes.has(s.code) && s.ntd >= t.single_bet_ntd).sort((a,b)=>b.ntd-a.ntd).slice(0,7);
  const consensusSell = outflow.filter(s => s.etfs_sell >= t.consensus_sell_etfs).sort((a,b)=>a.ntd-b.ntd);

  const ntdIn = totals.ntd_in || 0;
  const byEtfSorted = [...byEtf].sort((a,b)=>b.ntd_in-a.ntd_in);
  const dominant = byEtfSorted[0];
  const dominantPct = dominant && ntdIn > 0 ? Math.round(dominant.ntd_in / ntdIn * 100) : 0;

  const allBuy = [...consensusBuy, ...singleBets];
  const maxNtd = allBuy.length ? Math.max(...allBuy.map(s=>s.ntd)) : 1;
  const BAR_MAX = 14;

  function barHtml(ntd, isUp) {
    const filled = Math.max(1, Math.round(Math.abs(ntd) / maxNtd * BAR_MAX));
    const empty  = BAR_MAX - filled;
    const c = isUp ? '#b8860b' : '#4a7c4a';
    return `<span style="color:${c}">${'█'.repeat(filled)}</span><span style="color:#e0ddd2">${'█'.repeat(empty)}</span>`;
  }

  function rowsHtml(stocks, isUp) {
    return stocks.map(s => {
      const ntd = fmtNtd(s.ntd).padStart(7);
      const fam = isUp ? s.etfs_buy : s.etfs_sell;
      return `<div class="fc-row">
        <span class="r-name">${(s.name||'').replace(/\s/g,'')}</span>
        <span class="r-code">${s.code}</span>
        <span class="r-ntd ${isUp?'up':'dn'}">${ntd}</span>
        <span class="r-bar">${barHtml(s.ntd, isUp)}</span>
        <span class="r-fam">${fam}家</span>
      </div>`;
    }).join('');
  }

  const headDate = scope === 'weekly'
    ? `${shortDate(d.week_monday)}~${shortDate(d.week_friday)}`
    : shortDate(d.as_of);
  const headTitle = scope === 'weekly' ? '本週經理人資金流' : '盤前指引';

  let html = `
    <div class="fc-head">${headTitle} · <span class="fc-date">${headDate}</span> · <span class="fc-cov">${covered}/21家已揭露</span></div>
    <hr class="fc-rule-strong">`;

  const buyLabel = `共識買進 ≥${t.consensus_buy_etfs}家`;
  const betLabel = `單一大注 ≥${(t.single_bet_ntd/1e8).toFixed(0)}億`;
  const sellLabel = `共識賣 ≥${t.consensus_sell_etfs}家`;

  if (consensusBuy.length) {
    html += `<div class="fc-label">${buyLabel}</div><div class="fc-rows">${rowsHtml(consensusBuy, true)}</div>`;
    if (singleBets.length) html += `<hr class="fc-rule">`;
  }
  if (singleBets.length) {
    html += `<div class="fc-label">${betLabel}</div><div class="fc-rows">${rowsHtml(singleBets, true)}</div>`;
  }
  if (!consensusBuy.length && !singleBets.length) {
    html += `<div class="fc-nosell">無符合門檻的買進共識</div>`;
  }

  html += `<hr class="fc-rule">`;

  if (consensusSell.length) {
    html += `<div class="fc-label">${sellLabel}</div><div class="fc-rows">${rowsHtml(consensusSell, false)}</div>`;
  } else {
    html += `<div class="fc-nosell">${sellLabel}：無 — 沒有任何一檔被 ${t.consensus_sell_etfs} 家以上同時減碼</div>`;
  }

  html += `<hr class="fc-rule-strong">`;

  const netStr = fmtNtd(totals.net || 0);
  const periodLabel = scope === 'weekly' ? '本週淨流入' : '主動ETF 淨流入';
  if (dominantPct > 50 && dominant) {
    html += `<div class="fc-foot">${periodLabel} <span class="hi">${netStr}</span> · <span class="pct">${dominantPct}% basket buy</span> ${dominant.etf}</div>`;
  } else {
    html += `<div class="fc-foot">${periodLabel} <span class="hi">${netStr}</span> · ${covered}/21家已揭露</div>`;
  }

  card.innerHTML = html;
}

function renderNote(d, scope) {
  const thr = d.thresholds || {};
  const lagText = d.etfs_lagging.length ? d.etfs_lagging.join(' ') : '（全部到齊）';
  const t = THRESH[scope];
  if (scope === 'weekly') {
    return `
      <b>資料意義</b>：21 檔台灣主動型 ETF 經理人手上股數整週的累積變動。
      公式：(終點 shares − 起點 shares) × 終點收盤價，跨 ETF 加總後按個股聚合。
      原始過濾門檻 |Δshares| ≥ ${thr.shares_pct}% 且最大權重 ≥ ${thr.weight_floor_pp}pp；
      共識/大注顯示門檻：≥${t.consensus_buy_etfs}家共識買、≥${(t.single_bet_ntd/1e8).toFixed(0)}億大注、≥${t.consensus_sell_etfs}家共識賣。
      <br /><br />
      <b>注意</b>：每檔 ETF 用各自最新揭露日為終點，跨 ETF 比較略有 baseline 差（最多差幾天）。
      整週都未揭露的 ETF：<span class="mono">${lagText}</span>。
      00981A 大額申購會 basket buy 把每檔被動加成（買方非主觀決策）。
    `;
  }
  return `
    <b>資料意義</b>：21 檔台灣主動型 ETF 經理人手上股數的單日變動。
    公式：Δshares × 當日收盤價。原始過濾門檻 |Δshares| ≥ ${thr.shares_pct}% 且最大權重 ≥ ${thr.weight_floor_pp}pp；
    共識/大注顯示門檻：≥${t.consensus_buy_etfs}家共識買、≥${(t.single_bet_ntd/1e8).toFixed(0)}億大注、≥${t.consensus_sell_etfs}家共識賣。
    <br /><br />
    <b>注意</b>：部分 ETF 揭露延遲於 ${fmtDate(d.as_of)}，未納入本日聚合：
    <span class="mono">${lagText}</span>。
    00981A 當日若有大額申購，會做 basket buy 把每檔持股被動加成（買方不是主觀決策）。
  `;
}

let currentScope = 'weekly';

async function refresh() {
  const d = await loadScope(currentScope);
  $('sub').innerHTML = renderSub(d, currentScope);
  renderCard(d, currentScope);
  $('note').innerHTML = renderNote(d, currentScope);
}

$('seg').addEventListener('click', async ev => {
  const btn = ev.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#seg button').forEach(t => t.classList.toggle('active', t === btn));
  currentScope = btn.dataset.scope;
  location.hash = currentScope;
  await refresh();
});

const initScope = (location.hash || '#weekly').slice(1);
if (initScope === 'weekly' || initScope === 'daily') currentScope = initScope;
document.querySelectorAll('#seg button').forEach(t => t.classList.toggle('active', t.dataset.scope === currentScope));
refresh();

$('footer').textContent = '';
</script>
</body>
</html>
