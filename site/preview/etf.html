<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ETF preview</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --rule: #e0e0e0;
    --rule-strong: #a0a0a0;
    --accent: #0b6b3a;
    --accent-down: #8f2e2e;
    --paper: #fafaf7;
    --panel-bg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); height: 100%; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .num, .mono { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 24px 40px; }

  .crumb {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    font-family: ui-monospace, monospace;
  }
  .crumb a { color: var(--ink-soft); text-decoration: none; }
  .crumb a:hover { color: var(--ink); }

  header.etf-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule-strong);
    margin-bottom: 0;
  }
  header.etf-head h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .meta {
    color: var(--ink-soft);
    font-size: 12px;
    font-family: ui-monospace, monospace;
  }
  .meta span.sep { margin: 0 6px; color: var(--rule-strong); }

  /* Tab bar */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule-strong);
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 5;
  }
  .tabs button {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    padding: 12px 18px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabs button:hover { color: var(--ink); }
  .tabs button.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 600;
  }
  .tabs button .count {
    color: var(--ink-soft);
    font-weight: 400;
    margin-left: 6px;
    font-size: 11px;
  }

  /* Panels */
  .panel {
    display: none;
    background: var(--panel-bg);
    border: 1px solid var(--rule);
    border-top: none;
    padding: 20px;
    min-height: 520px;
  }
  .panel.active { display: block; }

  .panel-title {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 16px;
    font-family: ui-monospace, monospace;
    letter-spacing: 0.02em;
  }

  /* Top holdings table */
  .holdings-wrap {
    overflow-x: auto;
  }
  table.holdings {
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.holdings th {
    text-align: left;
    font-weight: 500;
    color: var(--ink-soft);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 8px 10px;
    border-bottom: 1px solid var(--rule-strong);
    white-space: nowrap;
  }
  table.holdings td {
    padding: 10px;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
  }
  table.holdings tr { cursor: pointer; }
  table.holdings tr:hover td { background: #f6f6f3; }
  table.holdings td.code { font-family: ui-monospace, monospace; color: var(--ink-soft); width: 60px; }
  table.holdings td.name { font-weight: 500; }
  table.holdings td.weight { font-family: ui-monospace, monospace; text-align: right; width: 70px; }
  table.holdings td.spark { width: 160px; padding-right: 0; }
  table.holdings td.since { font-family: ui-monospace, monospace; color: var(--ink-soft); font-size: 12px; width: 110px; white-space: nowrap; }
  table.holdings td.delta { font-family: ui-monospace, monospace; text-align: right; width: 70px; font-size: 12px; }
  .delta.up { color: var(--accent); }
  .delta.down { color: var(--accent-down); }
  table.holdings td.pnl { font-family: ui-monospace, monospace; text-align: right; width: 110px; font-size: 12px; line-height: 1.4; }
  table.holdings td.pnl .amt { font-size: 12px; }
  table.holdings td.pnl .pct { font-size: 10px; color: var(--ink-soft); display: block; }
  table.holdings td.pnl.gain .amt { color: var(--accent); }
  table.holdings td.pnl.gain .pct { color: var(--accent); }
  table.holdings td.pnl.loss .amt { color: var(--accent-down); }
  table.holdings td.pnl.loss .pct { color: var(--accent-down); }
  table.holdings td.pnl.na { color: var(--ink-soft); font-size: 11px; }
  table.holdings th.sortable { cursor: pointer; user-select: none; }
  table.holdings th.sortable:hover { color: var(--ink); }
  table.holdings th.sortable .arrow { color: var(--ink-soft); margin-left: 2px; font-size: 9px; }
  table.holdings th.sortable.active { color: var(--ink); }
  table.holdings th.sortable.active .arrow { color: var(--ink); }

  /* Small multiples grid — wrap downward, no horizontal scroll */
  .sm-strip-wrap { padding-bottom: 8px; }
  .sm-strip {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px 20px;
  }
  .sm-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
  }
  .sm-cell:hover .sm-head .n { text-decoration: underline; }
  .sm-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
  }
  .sm-head .c { font-family: ui-monospace, monospace; color: var(--ink-soft); }
  .sm-head .n { font-weight: 500; }
  .sm-head .w { font-family: ui-monospace, monospace; color: var(--ink); }
  .sm-cell svg { display: block; width: 100%; height: 48px; }
  .sm-cell .peak { font-size: 10px; font-family: ui-monospace, monospace; color: var(--ink-soft); margin-top: 2px; }

  /* Detail panel */
  .detail-layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
  .picker-col {
    max-height: 480px;
    overflow-y: auto;
    border-right: 1px solid var(--rule);
    padding-right: 12px;
  }
  .picker-col button {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    text-align: left;
    padding: 6px 8px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink);
    border-left: 2px solid transparent;
  }
  .picker-col button:hover { background: #f0f0ed; }
  .picker-col button.active {
    background: #f0f0ed;
    border-left-color: var(--ink);
    font-weight: 600;
  }
  .picker-col button .c { color: var(--ink-soft); margin-right: 6px; }
  .picker-col button .w { float: right; color: var(--ink-soft); }

  .detail-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .detail-head .title { font-weight: 600; font-size: 16px; }
  .detail-head .weight-now { font-family: ui-monospace, monospace; font-size: 20px; }
  .detail-subtitle { color: var(--ink-soft); font-size: 12px; font-family: ui-monospace, monospace; margin-bottom: 12px; }

  /* P&L card — 單股損益（股數 × 收盤價） */
  .pnl-card {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 16px;
    padding: 10px 14px;
    margin-bottom: 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: ui-monospace, monospace;
  }
  .pnl-card .k {
    color: var(--ink-soft);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .pnl-card .v {
    font-size: 16px;
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: -0.01em;
  }
  .pnl-card .v.gain { color: var(--accent); }
  .pnl-card .v.loss { color: var(--accent-down); }
  .pnl-card .sub {
    font-size: 10px;
    color: var(--ink-soft);
    margin-top: 1px;
  }
  .pnl-card .note {
    grid-column: 1 / -1;
    font-size: 10px;
    color: var(--ink-soft);
    padding-top: 6px;
    border-top: 1px dashed var(--rule);
    line-height: 1.5;
  }
  .pnl-card.missing { opacity: 0.7; }
  .pnl-card.missing .v { font-size: 12px; font-weight: 400; color: var(--ink-soft); }
  @media (max-width: 640px) {
    .pnl-card { grid-template-columns: repeat(2, 1fr); padding: 8px 10px; gap: 8px 12px; }
    .pnl-card .v { font-size: 14px; }
  }
  #detail-chart { width: 100%; height: 220px; display: block; }
  #detail-pnl-chart { width: 100%; height: 100px; display: block; margin-top: 4px; }
  .pnl-chart-label {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 8px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }
  .pnl-chart-label .final.gain { color: var(--accent); }
  .pnl-chart-label .final.loss { color: var(--accent-down); }
  .chart-legend {
    display: flex;
    gap: 16px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .chart-legend .swatch {
    display: inline-block;
    width: 14px;
    height: 2px;
    vertical-align: middle;
    margin-right: 4px;
  }
  .chart-legend .swatch.weight { background: #1a1a1a; height: 2px; }
  .chart-legend .swatch.lots { background: #4a6fa5; height: 1px; border-top: 1px solid #4a6fa5; }
  .chart-legend .swatch.price { background: #b08968; height: 1px; border-top: 1px dashed #b08968; }

  /* NEW 標記 — 剛建倉 (days_held < 30 AND last_date == as_of) */
  .tag-new {
    display: inline-block;
    padding: 1px 5px;
    margin-left: 6px;
    font-size: 9px;
    font-family: ui-monospace, monospace;
    letter-spacing: 0.08em;
    background: #f2b705;
    color: #1a1a1a;
    border-radius: 2px;
    vertical-align: middle;
    font-weight: 600;
  }
  .sm-cell.new {
    background: #fffaec;
    padding: 4px;
    border: 1px dashed #e0b84a;
    margin: -4px;
  }
  .picker-col button.new::after {
    content: "NEW";
    float: right;
    font-size: 9px;
    background: #f2b705;
    color: #1a1a1a;
    padding: 0 4px;
    border-radius: 2px;
    font-weight: 600;
    margin-left: 4px;
  }
  .picker-col button.new .w { display: none; }
  .new-note {
    padding: 20px 20px 16px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    border: 1px solid #e0b84a;
    background: #fffaec;
    color: var(--ink);
  }
  .new-note .hd {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom: 1px dashed #e0b84a;
    margin-bottom: 12px;
  }
  .new-note .hd .badge {
    background: #f2b705;
    color: #1a1a1a;
    padding: 2px 8px;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .new-note .hd .code-name { font-weight: 600; font-size: 14px; }
  .new-note .hd .rank { color: var(--ink-soft); margin-left: auto; font-size: 11px; }
  .new-note .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .new-note .stat { text-align: left; }
  .new-note .stat .k { color: var(--ink-soft); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  .new-note .stat .v { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .new-note .desc {
    color: var(--ink-soft);
    font-size: 11px;
    line-height: 1.6;
    padding-top: 10px;
    border-top: 1px dashed #e0b84a;
  }
  @media (max-width: 640px) {
    .new-note { padding: 14px; }
    .new-note .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .new-note .stat .v { font-size: 16px; }
  }
  .events {
    margin-top: 16px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid var(--rule);
  }
  .events .ev {
    display: grid;
    grid-template-columns: 110px 70px 160px 1fr;
    gap: 12px;
    padding: 6px 10px;
    border-top: 1px solid var(--rule);
  }
  .events .ev:first-child { border-top: none; }
  .events .ev .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .events .ev .tag { color: var(--ink-soft); }
  .dot.entry { background: var(--accent); }
  .dot.add { background: #6ab04c; }
  .dot.reduce { background: #e17055; }
  .dot.exit { background: var(--accent-down); }
  .dot.peak { background: #2d3436; }

  /* Daily single-day delta panel */
  .daily-wrap { display: flex; flex-direction: column; gap: 20px; }
  .daily-section h3 {
    margin: 0 0 8px;
    font-family: ui-monospace, monospace;
    font-size: 10px; font-weight: 600;
    color: var(--ink-soft); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .daily-section h3 .n-total {
    color: var(--ink); margin-left: 5px; font-size: 10px; font-weight: 400;
  }
  .daily-section h3 .more {
    color: var(--ink-soft); margin-left: 5px; font-size: 10px; font-weight: 400;
  }
  .daily-section .empty {
    font-family: ui-monospace, monospace;
    font-size: 11px; color: var(--ink-soft);
    padding: 4px 0;
  }
  .daily-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px 12px;
  }
  .daily-card {
    border: 1px solid var(--rule);
    border-left: 3px solid var(--rule);
    padding: 9px 11px;
    background: var(--paper);
    font-family: ui-monospace, monospace;
    font-size: 11px;
    display: flex; flex-direction: column; gap: 4px;
    cursor: pointer;
  }
  .daily-card .head { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
  .daily-card .code { font-size: 10px; color: var(--ink-soft); }
  .daily-card .name {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    color: var(--ink); font-size: 14px; font-weight: 600;
  }
  .daily-card .delta { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .daily-card .delta.add  { color: #d63031; }   /* 加碼：紅 */
  .daily-card .delta.red  { color: #00b894; }   /* 減碼：綠 */
  .daily-card .delta.blue { color: #0984e3; }   /* 新建倉：藍 */
  .daily-card .delta.gray { color: #888; }       /* 出清：灰 */
  .daily-card .shares-line { color: var(--ink-soft); font-size: 10px; }
  /* 左 border 色塊標示類型 */
  .daily-card.type-add  { border-left-color: #d63031; }
  .daily-card.type-red  { border-left-color: #00b894; }
  .daily-card.type-new  { border-left-color: #0984e3; }
  .daily-card.exit      { border-left-color: #aaa; opacity: 0.75; }

  /* P&L ranking panel */
  .pnl-rank-wrap { display: flex; flex-direction: column; gap: 22px; }
  .pnl-rank-section h3 {
    margin: 0 0 8px;
    font-family: ui-monospace, monospace;
    font-size: 11px; font-weight: 500;
    color: var(--ink-soft); letter-spacing: 0.04em;
  }
  .pnl-rank-section h3 .n-total { color: var(--ink); margin-left: 6px; font-size: 10px; }
  .pnl-rank-section h3 .sum { color: var(--ink-soft); margin-left: 6px; font-size: 10px; }
  .pnl-rank-section .empty { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); padding: 6px 0; }
  .pnl-rank-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px 14px;
  }
  .pnl-rank-card {
    border: 1px solid var(--rule);
    padding: 8px 10px;
    background: var(--paper);
    font-family: ui-monospace, monospace;
    font-size: 12px;
    display: flex; flex-direction: column; gap: 3px;
    cursor: pointer;
  }
  .pnl-rank-card:hover { background: #f6f6f3; }
  .pnl-rank-card .head { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
  .pnl-rank-card .name {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    color: var(--ink); font-size: 13px; font-weight: 500;
  }
  .pnl-rank-card .code { color: var(--ink-soft); }
  .pnl-rank-card .amt { font-size: 15px; font-weight: 600; }
  .pnl-rank-card.gain .amt { color: var(--accent); }
  .pnl-rank-card.loss .amt { color: var(--accent-down); }
  .pnl-rank-card .meta { color: var(--ink-soft); font-size: 11px; display: flex; justify-content: space-between; gap: 6px; }
  .pnl-rank-card .meta .pct.gain { color: var(--accent); }
  .pnl-rank-card .meta .pct.loss { color: var(--accent-down); }
  .pnl-rank-card.exited { border-left: 2px solid var(--ink-soft); }
  .pnl-rank-card .tag-exit {
    font-size: 9px; letter-spacing: 0.08em;
    background: var(--rule-strong); color: var(--ink);
    padding: 0 4px; border-radius: 2px; margin-left: 4px;
  }
  @media (max-width: 640px) {
    .pnl-rank-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px 10px; }
    .pnl-rank-card { padding: 6px 8px; font-size: 11px; }
    .pnl-rank-card .name { font-size: 12px; }
    .pnl-rank-card .amt { font-size: 13px; }
  }

  /* Exited panel - horizontal scroll */
  .exited-strip-wrap { overflow-x: auto; padding-bottom: 8px; }
  .exited-strip {
    display: grid;
    grid-template-rows: repeat(3, auto);
    grid-auto-flow: column;
    grid-auto-columns: 160px;
    gap: 10px 16px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
  .exited-strip .e {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 8px;
    border: 1px solid var(--rule);
    background: var(--paper);
  }
  .exited-strip .e .code { color: var(--ink); }
  .exited-strip .e .n { color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exited-strip .e .d { color: var(--ink-soft); font-size: 10px; }

  /* scroll bar */
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 4px; }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: var(--ink-soft);
    font-family: ui-monospace, monospace;
  }

  /* ============= Mobile ≤ 640px ============= */
  @media (max-width: 640px) {
    main { padding: 14px 12px 32px; }

    header.etf-head { gap: 8px; padding-bottom: 12px; }
    header.etf-head h1 { font-size: 18px; }
    .meta { font-size: 11px; }

    /* Tab bar: 橫向 scroll，避免擠壓 */
    .tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
    .tabs::-webkit-scrollbar { height: 0; }
    .tabs button { padding: 10px 12px; font-size: 12px; white-space: nowrap; }
    .tabs button .count { font-size: 10px; margin-left: 4px; }

    .panel { padding: 14px 12px; min-height: 420px; }
    .panel-title { font-size: 11px; margin-bottom: 12px; }

    /* Top holdings: 容器已 overflow-x auto，保留 min-width 給橫向 scroll */
    table.holdings { min-width: 640px; font-size: 12px; }
    table.holdings th { font-size: 10px; padding: 6px 8px; }
    table.holdings td { padding: 8px; }
    table.holdings td.spark { width: 120px; }
    table.holdings td.since { font-size: 11px; width: 90px; }

    /* Small multiples: 縮小最小寬度讓 column 更緊湊，svg 也縮一點 */
    .sm-strip { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px 14px; }
    .sm-cell svg { height: 44px; }

    /* Detail: 改成上下堆疊，picker 變成橫向 scroll 的 row */
    .detail-layout { grid-template-columns: 1fr; gap: 12px; }
    .picker-col {
      max-height: none;
      overflow-y: visible;
      overflow-x: auto;
      border-right: none;
      border-bottom: 1px solid var(--rule);
      padding-right: 0;
      padding-bottom: 8px;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
    }
    .picker-col button {
      display: inline-flex;
      width: auto;
      flex: 0 0 auto;
      padding: 6px 10px;
      border: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
      white-space: nowrap;
      font-size: 11px;
    }
    .picker-col button.active {
      border-color: var(--ink);
      border-left-color: var(--ink);
      border-left-width: 1px;
    }
    .picker-col button .w { float: none; margin-left: 6px; }

    .detail-head { flex-wrap: wrap; gap: 4px; }
    .detail-head .title { font-size: 14px; }
    .detail-head .weight-now { font-size: 16px; }
    .detail-subtitle { font-size: 11px; }
    #detail-chart { height: 180px; }

    /* Events: 改兩行 grid，避免 4-col 炸開 */
    .events { font-size: 11px; max-height: 200px; }
    .events .ev {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 2px 8px;
      padding: 6px 8px;
    }
    .events .ev > span:nth-child(1) { grid-column: 1; grid-row: 1; }
    .events .ev > span:nth-child(2) { grid-column: 2; grid-row: 1; text-align: right; }
    .events .ev > span:nth-child(3) { grid-column: 1 / 3; grid-row: 2; color: var(--ink); }
    .events .ev > span:nth-child(4) { grid-column: 1 / 3; grid-row: 3; font-size: 10px; }

    /* Exited: 縮 column 寬度 */
    .exited-strip { grid-auto-columns: 130px; gap: 8px 12px; font-size: 11px; }
    .exited-strip .e { padding: 5px 6px; }
    .exited-strip .e .d { font-size: 9px; }

    /* Daily: 縮小卡片寬度 */
    .daily-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px 10px; }
    .daily-card { padding: 7px 9px; font-size: 11px; }
    .daily-card .name { font-size: 13px; }
    .daily-card .delta { font-size: 13px; }
  }

  /* ============= Narrow mobile ≤ 380px (iPhone SE) ============= */
  @media (max-width: 380px) {
    main { padding: 10px 8px 24px; }
    header.etf-head h1 { font-size: 16px; }
    .panel { padding: 12px 10px; }
    .sm-cell { flex: 0 0 132px; }
    .exited-strip { grid-auto-columns: 118px; }
  }
</style>
</head>
<body>
<main>
  <div class="crumb">
    <a href="../">tw-active</a> / <a href="./">preview</a>
  </div>

  <header class="etf-head">
    <div>
      <h1 id="title">—</h1>
      <div class="meta" id="meta-line">—</div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="current" class="active">目前持股 <span class="count" id="count-current"></span></button>
    <button data-tab="daily">當日加減碼 <span class="count" id="count-daily"></span></button>
    <button data-tab="trace">歷史軌跡 <span class="count" id="count-trace"></span></button>
    <button data-tab="stock">單股進出場</button>
    <button data-tab="pnl">損益排行 <span class="count" id="count-pnl"></span></button>
    <button data-tab="exited">已出清 <span class="count" id="count-exited"></span></button>
  </nav>

  <!-- Tab: current holdings -->
  <section class="panel active" data-panel="current">
    <p class="panel-title">目前持倉全部揭露 · 點列切到「單股進出場」</p>
    <div class="holdings-wrap">
      <table class="holdings" id="holdings-table">
        <thead>
          <tr>
            <th>code</th>
            <th>name</th>
            <th class="sortable active" data-sort="weight" style="text-align:right">weight<span class="arrow">▼</span></th>
            <th>30d trend</th>
            <th class="sortable" data-sort="delta7" style="text-align:right">Δ7d<span class="arrow"></span></th>
            <th>since</th>
            <th class="sortable" data-sort="pnl" style="text-align:right">P&amp;L<span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="holdings-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- Tab: daily single-day delta -->
  <section class="panel" data-panel="daily">
    <p class="panel-title" id="daily-title">—</p>
    <div class="daily-wrap" id="daily-wrap"></div>
  </section>

  <!-- Tab: small multiples strip -->
  <section class="panel" data-panel="trace">
    <p class="panel-title">每檔股票一張 全期軌跡 · 往下捲看更多</p>
    <div class="sm-strip-wrap">
      <div class="sm-strip" id="sm-strip"></div>
    </div>
  </section>

  <!-- Tab: single stock detail -->
  <section class="panel" data-panel="stock">
    <p class="panel-title">左邊選股 · 右邊畫進出場時序 + 事件</p>
    <div class="detail-layout">
      <div class="picker-col" id="picker"></div>
      <div>
        <div class="detail-head">
          <div><span class="title" id="detail-title">—</span></div>
          <div class="weight-now" id="detail-weight">—</div>
        </div>
        <div class="detail-subtitle" id="detail-sub">—</div>
        <div class="pnl-card" id="pnl-card" style="display:none"></div>
        <div class="chart-legend">
          <span><span class="swatch weight"></span>ETF 權重 %（左軸）</span>
          <span><span class="swatch lots"></span>張數（右軸內側，ground truth）</span>
          <span><span class="swatch price"></span>收盤價 NT$（右軸外側）</span>
        </div>
        <svg id="detail-chart"></svg>
        <div class="pnl-chart-label" id="pnl-chart-label" style="display:none"></div>
        <svg id="detail-pnl-chart" style="display:none"></svg>
        <div class="events" id="events"></div>
      </div>
    </div>
  </section>

  <!-- Tab: pnl ranking -->
  <section class="panel" data-panel="pnl">
    <p class="panel-title" id="pnl-title">—</p>
    <div class="pnl-rank-wrap" id="pnl-rank-wrap"></div>
  </section>

  <!-- Tab: exited -->
  <section class="panel" data-panel="exited">
    <p class="panel-title">歷來曾持有、目前權重 0 · 橫向 scroll 看更多 →</p>
    <div class="exited-strip-wrap">
      <div class="exited-strip" id="exited-strip"></div>
    </div>
  </section>

  <div class="footer" id="footer">—</div>
</main>

<script type="module">
const params = new URLSearchParams(location.search);
const etfCode = (params.get('code') || '00981A').toUpperCase();
const slug = etfCode.toLowerCase();
document.title = `${etfCode} preview`;
const data = await fetch(`./${slug}.json`).then(r => {
  if (!r.ok) throw new Error(`找不到 ${slug}.json（ETF ${etfCode}）`);
  return r.json();
}).catch(err => {
  document.body.innerHTML = `<main style="font-family:ui-monospace,monospace;padding:40px;"><h1>—</h1><p style="color:#8f2e2e">${err.message}</p><p><a href="./">← preview 首頁</a></p></main>`;
  throw err;
});
const pricesJson = await fetch(`./${slug}-prices.json`).then(r => r.ok ? r.json() : null).catch(() => null);
const prices = pricesJson?.prices || {};
const isNew = data.is_new || {};
const $ = id => document.getElementById(id);
const fmt = d => `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
const newCount = Object.values(isNew).filter(Boolean).length;

// Header
$('title').textContent = `${data.etf.code}  ${data.etf.name}`;
$('meta-line').innerHTML = `${data.etf.issuer} · ${data.n_days} 個交易日 · ${fmt(data.first_date)} → ${fmt(data.as_of)}${newCount > 0 ? ` · 新建倉 <span class="mono">${newCount}</span>` : ''}`;

$('count-current').textContent = data.current.filter(h => h.weight > 1).length;
$('count-trace').textContent = data.current.length;
$('count-exited').textContent = data.exited_codes.length;
$('footer').textContent = `data ${slug}.json · as-of ${fmt(data.as_of)}`;

// ============= Tabs =============
const tabs = $('tabs');
tabs.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  const target = e.target.dataset.tab;
  for (const b of tabs.querySelectorAll('button')) b.classList.toggle('active', b.dataset.tab === target);
  for (const p of document.querySelectorAll('.panel')) p.classList.toggle('active', p.dataset.panel === target);
  location.hash = target;
});
const initHash = (location.hash || '#current').slice(1);
const initBtn = tabs.querySelector(`button[data-tab="${initHash}"]`);
if (initBtn) initBtn.click();

function switchTab(name) {
  tabs.querySelector(`button[data-tab="${name}"]`)?.click();
}

// ============= Global formatters =============
// 「張」= shares / 1000（台股慣例），四捨五入後加 thousand-sep
// 變動一律寫張數 delta + 權重 pp（見 feedback_lots_and_weight_together memory）
function fmtLots(shares) {
  if (shares == null) return '—';
  return Math.round(shares / 1000).toLocaleString();
}
function fmtLotsDelta(shares) {
  if (shares == null) return '—';
  const s = Math.round(shares / 1000);
  return (s > 0 ? '+' : '') + s.toLocaleString();
}
// NT$ 三段：≥1 億 → X.XX 億元；≥1 萬 → X 萬元；else X 元
function fmtNTValue(n) {
  if (n == null) return null;
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e8) return sign + (abs / 1e8).toFixed(2) + ' 億元';
  if (abs >= 1e4) return sign + Math.round(abs / 1e4).toLocaleString() + ' 萬元';
  return sign + Math.round(abs).toLocaleString() + ' 元';
}
function fmtNTValueSigned(n) {
  if (n == null) return null;
  return (n > 0 ? '+' : '') + fmtNTValue(n);
}

// ============= Current holdings > 1% =============
const WEIGHT_THRESHOLD = 1.0; // % — 對齊 SITCA IN2630 ≥1% 揭露規則
const mainHoldings = data.current.filter(h => h.weight > WEIGHT_THRESHOLD);
const tbody = $('holdings-tbody');

// 預先算出 rows 資料，sort 時重排 DOM
// P&L 用 data.pnl[code] — 由 tools/preview_build.py _compute_stock_pnl 算好
const pnlMap = data.pnl || {};
function fmtPnlNT(v) {
  const abs = Math.abs(v);
  if (abs >= 1e8) return (v / 1e8).toFixed(2) + '億';
  if (abs >= 1e4) return (v / 1e4).toFixed(0) + '萬';
  return Math.round(v).toLocaleString();
}
const rowsData = mainHoldings.map(h => {
  const s = data.series[h.code] || [];
  const delta7 = deltaDays(s, 7);
  const pnl = pnlMap[h.code] || null;
  return { h, s, delta7, pnl };
});

function renderRows(sortKey, desc) {
  const sorted = [...rowsData].sort((a, b) => {
    let av, bv;
    if (sortKey === 'weight') { av = a.h.weight; bv = b.h.weight; }
    else if (sortKey === 'delta7') { av = a.delta7 ?? -Infinity; bv = b.delta7 ?? -Infinity; }
    else if (sortKey === 'pnl') {
      // has_prices 優先；non-TW / 無股價排到底
      av = (a.pnl && a.pnl.has_prices) ? a.pnl.pnl : -Infinity;
      bv = (b.pnl && b.pnl.has_prices) ? b.pnl.pnl : -Infinity;
    }
    return desc ? bv - av : av - bv;
  });
  tbody.innerHTML = '';
  for (const { h, s, delta7, pnl } of sorted) {
    const sparkSvg = renderSparkline(s.slice(-30), 150, 32);
    const deltaCls = delta7 > 0 ? 'up' : delta7 < 0 ? 'down' : '';
    const deltaStr = delta7 !== null ? `${delta7 > 0 ? '+' : ''}${delta7.toFixed(2)}pp` : '—';
    const firstDate = s.length ? fmt(s[0].date) : '—';
    const newTag = isNew[h.code] ? '<span class="tag-new">NEW</span>' : '';

    let pnlCell;
    if (pnl && pnl.has_prices) {
      const cls = pnl.pnl > 0 ? 'gain' : pnl.pnl < 0 ? 'loss' : '';
      const sign = pnl.pnl > 0 ? '+' : '';
      const pctStr = pnl.pnl_pct == null ? '—' : `${pnl.pnl_pct > 0 ? '+' : ''}${pnl.pnl_pct.toFixed(1)}%`;
      pnlCell = `<td class="pnl ${cls}"><span class="amt">${sign}${fmtPnlNT(pnl.pnl)}</span><span class="pct">${pctStr}</span></td>`;
    } else {
      pnlCell = `<td class="pnl na">—</td>`;
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="code">${h.code}</td>
      <td class="name">${h.name}${newTag}</td>
      <td class="weight">${h.weight.toFixed(2)}%</td>
      <td class="spark">${sparkSvg}</td>
      <td class="delta ${deltaCls}">${deltaStr}</td>
      <td class="since">${firstDate}</td>
      ${pnlCell}
    `;
    tr.onclick = () => { selectStock(h.code); switchTab('stock'); };
    tbody.appendChild(tr);
  }
}

// 預設：weight desc
let curSort = { key: 'weight', desc: true };
renderRows(curSort.key, curSort.desc);

// 點 th 切排序
document.querySelectorAll('#holdings-table th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (curSort.key === key) curSort.desc = !curSort.desc;
    else curSort = { key, desc: true };
    document.querySelectorAll('#holdings-table th.sortable').forEach(x => {
      const arrow = x.querySelector('.arrow');
      if (x.dataset.sort === curSort.key) {
        x.classList.add('active');
        arrow.textContent = curSort.desc ? '▼' : '▲';
      } else {
        x.classList.remove('active');
        arrow.textContent = '';
      }
    });
    renderRows(curSort.key, curSort.desc);
  });
});

// ============= Daily single-day delta =============
// 讀 data.daily_shares：最新交易日 vs 上一個交易日的股數變動。
// 研究動機：30 日看趨勢、單日看經理人當天的動作。揭露 T+1，這是能觀察到的
// 最近一次具體交易決策。權重 % 受股價 confound，股數才是 ground truth。
(function renderDaily() {
  const ds = data.daily_shares;
  const dailyWrap = $('daily-wrap');
  const dailyTitle = $('daily-title');
  const dailyCount = $('count-daily');
  if (!ds) {
    dailyCount.textContent = '';
    dailyTitle.textContent = '此 ETF 暫無單日股數資料';
    dailyWrap.innerHTML = '<div class="empty" style="font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-soft);">（raw/cmoney/shares/ 缺或僅一個交易日資料）</div>';
    return;
  }
  const nAdjusted = (ds.n_adds_total || 0) + (ds.n_reductions_total || 0);
  dailyCount.textContent = nAdjusted || '';
  dailyTitle.innerHTML = `<span class="mono">${fmt(ds.latest_date)}</span> vs <span class="mono">${fmt(ds.prev_date)}</span> · 過濾 &lt;0.3% 試水溫 · 點卡片看歷史軌跡`;

  // close on or before a given date (揭露 T+1，無 close 落地時用最近一筆)
  const closeOnOrBefore = (code, date) => {
    const series = prices[code] || [];
    if (!series.length) return null;
    let last = null;
    for (const p of series) {
      if (!p.date) continue;
      if (p.date <= date) last = p.close;
      else break;
    }
    return last;
  };

  function cardRow(e, kind) {
    const cls = kind === 'add' ? 'add' : 'red';
    const close = closeOnOrBefore(e.code, ds.latest_date);
    const tradeValue = close != null ? e.delta * close : null;    // 當天投入/收回
    const currentValue = close != null ? e.shares * close : null;  // 當下市值（當天 close）
    const dWeight = e.weight - e.prev_weight;
    const sign = dWeight > 0 ? '+' : '';
    // 四段式：張數 / pp / 投入金額 / 當下市值
    const parts = [
      `${fmtLotsDelta(e.delta)} 張`,
      `${sign}${dWeight.toFixed(2)}pp`,
    ];
    if (tradeValue != null) parts.push(`投入 ${fmtNTValueSigned(tradeValue)}`);
    if (currentValue != null) parts.push(`當下市值 ${fmtNTValue(currentValue)}`);
    const primary = parts.join(' / ');
    const typeClass = kind === 'add' ? 'type-add' : 'type-red';
    return `
      <div class="daily-card ${typeClass}">
        <div class="head">
          <span class="name">${e.name}</span>
          <span class="code">${e.code}</span>
        </div>
        <div class="delta ${cls}">${primary}</div>
        <div class="shares-line">${fmtLots(e.prev_shares)} → ${fmtLots(e.shares)} 張 · ${e.weight}%</div>
      </div>`;
  }
  function newCard(e) {
    const close = closeOnOrBefore(e.code, ds.latest_date);
    const tradeValue = close != null ? e.shares * close : null;  // 新建倉：投入 = 當下市值
    const parts = [
      `新建倉 ${fmtLots(e.shares)} 張`,
      `${e.weight}%`,
    ];
    if (tradeValue != null) parts.push(`投入 ${fmtNTValue(tradeValue)}`);
    if (tradeValue != null) parts.push(`當下市值 ${fmtNTValue(tradeValue)}`);
    const primary = parts.join(' / ');
    return `
      <div class="daily-card type-new">
        <div class="head">
          <span class="name">${e.name}</span>
          <span class="code">${e.code}</span>
        </div>
        <div class="delta blue">${primary}</div>
      </div>`;
  }
  function exitCard(e) {
    const close = closeOnOrBefore(e.code, ds.prev_date);
    const tradeValue = close != null ? e.prev_shares * close : null; // 出清：收回金額（+）
    // 出清後「當下市值」= 0，不必顯示，但交易金額顯示「收回」
    const parts = [
      `出清 ${fmtLots(e.prev_shares)} 張`,
      `前一日 ${e.prev_weight}%`,
    ];
    if (tradeValue != null) parts.push(`收回約 ${fmtNTValue(tradeValue)}`);
    parts.push('當下市值 0');
    const primary = parts.join(' / ');
    return `
      <div class="daily-card exit">
        <div class="head">
          <span class="name">${e.name}</span>
          <span class="code">${e.code}</span>
        </div>
        <div class="delta gray">${primary}</div>
      </div>`;
  }

  function section(title, items, renderer, nTotal) {
    const more = (nTotal != null && nTotal > items.length)
      ? `<span class="more">（另 ${nTotal - items.length} 檔同類）</span>` : '';
    const nTag = nTotal != null ? `<span class="n-total">${nTotal}</span>` : '';
    const body = items.length
      ? `<div class="daily-grid">${items.map(renderer).join('')}</div>`
      : `<div class="empty">—</div>`;
    return `<div class="daily-section"><h3>${title}${nTag}${more}</h3>${body}</div>`;
  }

  dailyWrap.innerHTML = [
    section('加碼', ds.top_adds, e => cardRow(e, 'add'), ds.n_adds_total),
    section('減碼', ds.top_reductions, e => cardRow(e, 'red'), ds.n_reductions_total),
    section('新建倉', ds.new_positions, newCard, ds.n_new_total),
    section('出清', ds.exits, exitCard, ds.n_exits_total),
  ].join('');

  // 點卡片 → 切到 單股進出場
  dailyWrap.addEventListener('click', ev => {
    const card = ev.target.closest('.daily-card');
    if (!card) return;
    const codeEl = card.querySelector('.code');
    if (!codeEl) return;
    const code = codeEl.textContent.trim();
    if (data.series && data.series[code]) {
      selectStock(code); switchTab('stock');
    }
  });
})();

// ============= Small multiples horizontal strip =============
// Sort so NEW 倉位 放最前（研究訊號，不淹沒在中段）
const smStrip = $('sm-strip');
const smOrder = [...data.current].sort((a, b) => {
  const an = isNew[a.code] ? 1 : 0, bn = isNew[b.code] ? 1 : 0;
  if (an !== bn) return bn - an; // NEW first
  return b.weight - a.weight;
});
for (const h of smOrder) {
  const s = data.series[h.code] || [];
  const peak = s.length ? Math.max(...s.map(x => x.weight)) : 0;
  const isNewPos = !!isNew[h.code];
  const cell = document.createElement('div');
  cell.className = 'sm-cell' + (isNewPos ? ' new' : '');
  const newTag = isNewPos ? '<span class="tag-new">NEW</span>' : '';
  const footerLine = isNewPos
    ? `首建 ${fmt(s[0].date)} · 第 ${s.length} 日`
    : `peak ${peak.toFixed(2)}% · ${s.length}d`;
  cell.innerHTML = `
    <div class="sm-head">
      <span><span class="c">${h.code}</span> <span class="n">${h.name}</span>${newTag}</span>
      <span class="w">${h.weight.toFixed(2)}%</span>
    </div>
    ${renderSparkline(s, 180, 48, { showDot: true })}
    <div class="peak">${footerLine}</div>
  `;
  cell.addEventListener('click', () => { selectStock(h.code); switchTab('stock'); });
  smStrip.appendChild(cell);
}

// ============= Detail picker =============
const picker = $('picker');
// picker 顯示全部曾持（current + exited），用 days_held 排序
const pickerItems = [
  ...data.current.map(x => ({code: x.code, weight: x.weight, active: true})),
  ...data.exited_codes.map(c => ({code: c, weight: 0, active: false})),
];
// NEW 倉位往前排，方便點選
pickerItems.sort((a, b) => {
  const an = isNew[a.code] ? 1 : 0, bn = isNew[b.code] ? 1 : 0;
  if (an !== bn) return bn - an;
  if (a.active !== b.active) return b.active - a.active;
  return b.weight - a.weight;
});
for (const it of pickerItems) {
  const btn = document.createElement('button');
  btn.dataset.code = it.code;
  const name = data.name_of[it.code] || it.code;
  if (isNew[it.code]) btn.classList.add('new');
  btn.innerHTML = `<span class="c">${it.code}</span>${name}<span class="w">${it.weight.toFixed(2)}%</span>`;
  btn.onclick = () => selectStock(it.code);
  picker.appendChild(btn);
}

function selectStock(code) {
  for (const b of picker.querySelectorAll('button')) {
    b.classList.toggle('active', b.dataset.code === code);
    if (b.dataset.code === code) b.scrollIntoView({block: 'nearest'});
  }
  const s = data.series[code] || [];
  const name = data.name_of[code] || code;
  const cur = s.length ? s[s.length - 1].weight : 0;
  const first = s.length ? s[0].date : null;
  const last = s.length ? s[s.length - 1].date : null;
  const isNewPos = !!isNew[code];

  $('detail-title').innerHTML = `${code}  ${name}` + (isNewPos ? ' <span class="tag-new">NEW</span>' : '');
  $('detail-weight').textContent = cur > 0 ? cur.toFixed(2) + '%' : 'exited';
  $('detail-sub').textContent = first
    ? (isNewPos
        ? `首次建倉 ${fmt(first)} · 第 ${s.length} 個交易日 · 軌跡剛開始累積`
        : `first ${fmt(first)} · last ${fmt(last)} · ${s.length} 個交易日出現`)
    : '—';

  renderPnlCard(code);

  const svg = $('detail-chart');
  const evDiv = $('events');
  const legend = document.querySelector('.chart-legend');

  if (isNewPos && s.length < 5) {
    // 軌跡太短，不畫 chart，顯示研究訊號卡（資料 + 文案）
    svg.innerHTML = '';
    svg.style.display = 'none';
    if (legend) legend.style.display = 'none';
    evDiv.style.display = 'none';
    $('detail-pnl-chart').style.display = 'none';
    $('pnl-chart-label').style.display = 'none';
    let note = document.getElementById('new-note');
    if (!note) {
      note = document.createElement('div');
      note.id = 'new-note';
      note.className = 'new-note';
      svg.parentElement.appendChild(note);
    }
    note.style.display = 'block';

    // 算這檔在 NEW 倉位裡面的 rank / 總數（by weight desc）
    const newList = Object.keys(isNew).filter(c => isNew[c]);
    newList.sort((a, b) => {
      const wa = (data.series[a] || [{weight: 0}]).slice(-1)[0].weight;
      const wb = (data.series[b] || [{weight: 0}]).slice(-1)[0].weight;
      return wb - wa;
    });
    const rankInNew = newList.indexOf(code) + 1;

    // 看 ETF 當日總權重裡面排第幾
    const sortedCurrent = [...data.current].sort((a, b) => b.weight - a.weight);
    const rankOverall = sortedCurrent.findIndex(h => h.code === code) + 1;

    // 若有價格資料，展示該日收盤
    const px = (prices[code] || []).find(p => p.date === first);
    const priceCell = px
      ? `<div class="stat"><div class="k">建倉日收盤</div><div class="v">NT$${px.close.toFixed(2)}</div></div>`
      : `<div class="stat"><div class="k">建倉日收盤</div><div class="v" style="color:#8f2e2e;font-size:12px;font-weight:400;">暫缺（TWSE rate limit）</div></div>`;

    note.innerHTML = `
      <div class="hd">
        <span class="badge">NEW · 新建倉</span>
        <span class="code-name">${code} ${name}</span>
        <span class="rank">00981A 新建倉第 ${rankInNew}／${newList.length} 檔</span>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="k">建倉日</div>
          <div class="v">${fmt(first)}</div>
        </div>
        <div class="stat">
          <div class="k">權重</div>
          <div class="v">${cur.toFixed(2)}%</div>
        </div>
        <div class="stat">
          <div class="k">當日持股排序</div>
          <div class="v">#${rankOverall}／${data.current.length}</div>
        </div>
      </div>
      <div class="stats">
        ${priceCell}
        <div class="stat">
          <div class="k">已持有</div>
          <div class="v">${s.length} 個交易日</div>
        </div>
        <div class="stat">
          <div class="k">軌跡長度</div>
          <div class="v" style="font-size:14px;">${s.length < 5 ? '尚不足繪圖' : '可繪'}</div>
        </div>
      </div>
      <div class="desc">
        ${code} ${name} 是 00981A 最近才放進去的股票。在研究上這是**新建倉訊號**——
        經理人決定從今天開始布局這檔，但目前只有 ${s.length} 天資料，軌跡、加減碼事件、
        擇時品質（買在相對高點還是低點）都還不夠累積樣本可判斷。
        等到這檔持有超過 30 個交易日後，會自動進入主要軌跡統計，NEW 標記會移除。
      </div>
    `;
    return;
  }

  // 正常走 chart
  svg.style.display = '';
  if (legend) legend.style.display = '';
  evDiv.style.display = '';
  const note = document.getElementById('new-note');
  if (note) note.style.display = 'none';

  const isExitedCode = data.exited_codes.includes(code);
  drawDetailChart(s, code, isExitedCode);
  drawPnlCurve(s, code);

  const events = detectEvents(s, code, isExitedCode);
  evDiv.innerHTML = '';
  for (const e of events) {
    const div = document.createElement('div');
    div.className = 'ev';
    const dotCls = e.type.toLowerCase();
    div.innerHTML = `
      <span><span class="dot ${dotCls}"></span>${fmt(e.date)}</span>
      <span class="tag">${e.type}</span>
      <span>${renderEventNote(e)}</span>
    `;
    evDiv.appendChild(div);
  }
}

// ============= P&L card (detail) =============
// 資料來源：build 時在 tools/preview_build.py _compute_stock_pnl 算好 data.pnl[code]
// 公式：MV_now + Σ(-Δshares × close_t)；cost_basis = Σ 買入金額
// 為什麼重要：權重 % 會被股價漲跌 confound（股價漲→權重自然升），
// 股數 × 股價才是實際賺賠。
function renderPnlCard(code) {
  const card = $('pnl-card');
  const pnl = (data.pnl || {})[code];
  if (!pnl) { card.style.display = 'none'; return; }
  card.style.display = '';

  const fmtNT = v => {
    const abs = Math.abs(v);
    if (abs >= 1e8) return (v / 1e8).toFixed(2) + ' 億';
    if (abs >= 1e4) return (v / 1e4).toFixed(1) + ' 萬';
    return Math.round(v).toLocaleString();
  };
  const fmtPct = v => (v == null ? '—' : (v > 0 ? '+' : '') + v.toFixed(2) + '%');

  if (!pnl.has_prices) {
    card.className = 'pnl-card missing';
    card.innerHTML = `
      <div><div class="k">損益</div><div class="v">無股價資料</div></div>
      <div><div class="k">最新張數</div><div class="v">${fmtLots(pnl.shares_latest)} 張</div></div>
      <div><div class="k">最新日</div><div class="v">${fmt(pnl.latest_date)}</div></div>
      <div><div class="k">原因</div><div class="v">海外/期貨/現金</div></div>
      <div class="note">非 TW 股票不在 FinMind TaiwanStockPrice 資料範圍（海外股 / 期貨 / 現金標記），P&amp;L 暫不計算。</div>
    `;
    return;
  }

  const signSym = pnl.pnl > 0 ? '+' : '';
  const pnlCls = pnl.pnl > 0 ? 'gain' : pnl.pnl < 0 ? 'loss' : '';
  const retCls = pnl.pnl_pct == null ? '' : pnl.pnl_pct > 0 ? 'gain' : pnl.pnl_pct < 0 ? 'loss' : '';
  const exited = pnl.shares_latest === 0;
  const pnlLabel = exited ? '已實現損益' : '損益（未實現+已實現）';
  const retLabel = exited ? '實現報酬率' : '報酬率';

  const missingNote = pnl.missing_price_days > 0
    ? `（${pnl.missing_price_days}/${pnl.total_delta_days} 個交易日缺股價，已用 fallback 近似）` : '';

  card.className = 'pnl-card';
  card.innerHTML = `
    <div>
      <div class="k">${pnlLabel}</div>
      <div class="v ${pnlCls}">${signSym}${fmtNT(pnl.pnl)}</div>
      <div class="sub">NT$</div>
    </div>
    <div>
      <div class="k">${retLabel}</div>
      <div class="v ${retCls}">${fmtPct(pnl.pnl_pct)}</div>
      <div class="sub">vs 累計買入成本</div>
    </div>
    <div>
      <div class="k">${exited ? '目前市值' : '目前市值'}</div>
      <div class="v">${exited ? '—' : fmtNT(pnl.mv_now)}</div>
      <div class="sub">${exited ? `已出清 · ${fmt(pnl.latest_date)} 收盤 NT$${pnl.latest_price}` : `${fmtLots(pnl.shares_latest)} 張 × NT$${pnl.latest_price}`}</div>
    </div>
    <div>
      <div class="k">累計買入成本</div>
      <div class="v">${fmtNT(pnl.cost_basis)}</div>
      <div class="sub">Σ 買入金額</div>
    </div>
    <div class="note">
      算法：CF<sub>t</sub> = −Δshares × close<sub>t</sub>（買=負，賣=正）；${exited ? '已實現損益 = Σ CF<sub>t</sub>（含出清收入）' : '總損益 = 目前市值 + Σ CF<sub>t</sub>'}；
      報酬率 = 總損益 ÷ 累計買入成本。${pnl.total_delta_days} 個股數變動日，用 FinMind 該日收盤價當成交價近似。${missingNote}
    </div>
  `;
}

function detectEvents(s, code, isExited = false) {
  if (!s.length) return [];
  const events = [];
  // 共用 close series（「當下市值」用事件當天 close，不再需要 latestClose）
  const priceSeries = (code && prices[code]) || [];
  const closeForCode = (date) => {
    if (!priceSeries.length) return null;
    let last = null;
    for (const p of priceSeries) {
      if (!p.date) continue;
      if (p.date <= date) last = p.close;
      else break;
    }
    return last;
  };

  // ENTRY: 首次建倉（當天投入 = 當下市值，不再 append 重複欄位）
  {
    const sh0 = typeof s[0].shares === 'number' ? s[0].shares : null;
    const close0 = closeForCode(s[0].date);
    events.push({
      type: 'ENTRY', date: s[0].date, weight: s[0].weight,
      shares: sh0,
      tradeValue: (sh0 != null && close0 != null) ? sh0 * close0 : null,  // 建倉投入
    });
  }

  // ADD/REDUCE (feedback_shares_not_weight_for_comparison)
  // 四段式：張數 / pp / 投入金額 / 當下市值（feedback_lots_and_weight_together）
  // 「當下市值」= shares_at_event × close_at_event（事件當下 snapshot，不是 latest）
  // 用 latest × latest 會讓整條 timeline 每列都貼同一個數字，失去時序意義
  const sharesPctThreshold = (data.daily_shares && data.daily_shares.shares_pct_threshold) || 3;
  const hasShares = s.some(p => typeof p.shares === 'number');

  for (let i = 1; i < s.length; i++) {
    const cur = s[i], prev = s[i - 1];
    if (hasShares && typeof cur.shares === 'number' && typeof prev.shares === 'number' && prev.shares > 0) {
      const dShares = cur.shares - prev.shares;
      const pct = dShares / prev.shares * 100;
      if (Math.abs(pct) >= sharesPctThreshold) {
        const type = dShares > 0 ? 'ADD' : 'REDUCE';
        const close = closeForCode(cur.date);
        events.push({
          type, date: cur.date,
          weight: cur.weight, fromWeight: prev.weight,
          shares: cur.shares, fromShares: prev.shares,
          dShares, dWeight: cur.weight - prev.weight,
          tradeValue: close != null ? dShares * close : null,
          currentValue: close != null ? cur.shares * close : null,  // 該事件當下市值
        });
      }
    } else {
      const delta = cur.weight - prev.weight;
      if (delta >= 0.5) {
        events.push({ type: 'ADD', date: cur.date, weight: cur.weight, fromWeight: prev.weight, dWeight: delta });
      } else if (delta <= -0.5) {
        events.push({ type: 'REDUCE', date: cur.date, weight: cur.weight, fromWeight: prev.weight, dWeight: delta });
      }
    }
  }

  const maxW = Math.max(...s.map(x => x.weight));
  const peakIdx = s.findIndex(x => x.weight === maxW);
  events.push({ type: 'PEAK', date: s[peakIdx].date, weight: maxW });

  if (isExited && s.length) {
    const last = s[s.length - 1];
    const close = closeForCode(last.date);
    events.push({
      type: 'EXIT', date: last.date, weight: last.weight,
      shares: typeof last.shares === 'number' ? last.shares : null,
      currentValue: (typeof last.shares === 'number' && close != null) ? last.shares * close : null,
    });
  }

  return events.sort((a, b) => a.date.localeCompare(b.date));
}

// Event row 顯示四段式：張數 / pp / 投入金額 / 當下市值
// 「當下市值」= 該事件當下 shares × 當天 close（snapshot，非 latest）
// （feedback_lots_and_weight_together memory）
function renderEventNote(e) {
  if (e.type === 'ENTRY') {
    const parts = [`首次建倉`];
    if (e.shares != null) parts.push(`${fmtLots(e.shares)} 張`);
    parts.push(`${e.weight.toFixed(2)}%`);
    if (e.tradeValue != null) parts.push(`投入 ${fmtNTValue(e.tradeValue)}`);
    return parts.join(' / ');
  }
  if (e.type === 'PEAK') {
    return `歷史權重高 ${e.weight.toFixed(2)}%`;
  }
  if (e.type === 'EXIT') {
    const parts = ['全數出清'];
    if (e.shares != null) parts.push(`${fmtLots(e.shares)} 張`);
    if (e.currentValue != null) parts.push(`出清市值 ${fmtNTValue(e.currentValue)}`);
    return parts.join(' / ');
  }
  // ADD / REDUCE
  const sign = e.dWeight > 0 ? '+' : '';
  const parts = [];
  if (e.dShares != null) parts.push(`${fmtLotsDelta(e.dShares)} 張`);
  if (e.dWeight != null) parts.push(`${sign}${e.dWeight.toFixed(2)}pp`);
  if (e.tradeValue != null) parts.push(`投入 ${fmtNTValueSigned(e.tradeValue)}`);
  if (e.currentValue != null) parts.push(`當下市值 ${fmtNTValue(e.currentValue)}`);
  return parts.join(' / ');
}

// ============= P&L curve chart (detail, 第二軸) =============
// 每日 P&L_t = shares_t × close_t + Σ_{s≤t} CF_s
// 股價漲/跌 + 加碼/減碼 合成的單股累計損益曲線
// 零線以上綠色 / 以下紅色區域填色；最終值右下角標出
function drawPnlCurve(s, code) {
  const svg = $('detail-pnl-chart');
  const label = $('pnl-chart-label');
  const curveAll = (data.pnl_curves || {})[code];
  const curveDates = data.pnl_curve_dates || [];
  if (!curveAll || !curveDates.length || !s.length) {
    svg.style.display = 'none';
    label.style.display = 'none';
    return;
  }
  // 對齊主 chart x-axis：取 s.dates 對應的 pnl 值
  const dateIdx = new Map(curveDates.map((d, i) => [d, i]));
  const pts = s.map(p => {
    const i = dateIdx.get(p.date);
    return i == null ? null : curveAll[i];
  });
  // 如果整段都是 null 或 0，不畫
  const valid = pts.filter(v => v != null);
  if (valid.length < 2) {
    svg.style.display = 'none';
    label.style.display = 'none';
    return;
  }

  svg.style.display = '';
  label.style.display = '';
  svg.innerHTML = '';

  const W = svg.clientWidth || 800, H = 100;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const pad = { l: 44, r: 44, t: 10, b: 18 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;

  const vMax = Math.max(...valid, 0);
  const vMin = Math.min(...valid, 0);
  const range = vMax - vMin || 1;
  const n = pts.length;
  const x = i => pad.l + (i / Math.max(n - 1, 1)) * w;
  const y = v => pad.t + (1 - (v - vMin) / range) * h;
  const y0 = y(0);

  // Zero reference line
  svg.insertAdjacentHTML('beforeend',
    `<line x1="${pad.l}" x2="${W - pad.r}" y1="${y0}" y2="${y0}" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>`);

  // 區域 fill：綠色（上）、紅色（下）
  // 把路徑切成 segments，每個 segment 從左到右連續但在 zero 處斷開
  let areaUp = `M${pad.l},${y0}`;
  let areaDown = `M${pad.l},${y0}`;
  for (let i = 0; i < n; i++) {
    const v = pts[i] ?? 0;
    const vClampedUp = Math.max(0, v);
    const vClampedDown = Math.min(0, v);
    areaUp += `L${x(i).toFixed(1)},${y(vClampedUp).toFixed(1)}`;
    areaDown += `L${x(i).toFixed(1)},${y(vClampedDown).toFixed(1)}`;
  }
  areaUp += `L${x(n - 1).toFixed(1)},${y0}Z`;
  areaDown += `L${x(n - 1).toFixed(1)},${y0}Z`;
  svg.insertAdjacentHTML('beforeend', `<path d="${areaUp}" fill="#0b6b3a" fill-opacity="0.12" stroke="none"/>`);
  svg.insertAdjacentHTML('beforeend', `<path d="${areaDown}" fill="#8f2e2e" fill-opacity="0.12" stroke="none"/>`);

  // 主線
  let d = '';
  for (let i = 0; i < n; i++) {
    const v = pts[i];
    if (v == null) continue;
    d += `${d === '' ? 'M' : 'L'}${x(i).toFixed(1)},${y(v).toFixed(1)} `;
  }
  svg.insertAdjacentHTML('beforeend', `<path d="${d.trim()}" fill="none" stroke="#2d3436" stroke-width="1.25"/>`);

  // 左軸 label：max / min
  const fmtAxis = v => {
    const abs = Math.abs(v);
    if (abs >= 1e8) return (v / 1e8).toFixed(1) + '億';
    if (abs >= 1e4) return (v / 1e4).toFixed(0) + '萬';
    return Math.round(v).toLocaleString();
  };
  svg.insertAdjacentHTML('beforeend', `
    <text x="${pad.l - 6}" y="${y(vMax) + 3}" fill="#888" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">${fmtAxis(vMax)}</text>
    <text x="${pad.l - 6}" y="${y(vMin) + 3}" fill="#888" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">${fmtAxis(vMin)}</text>
    <text x="${pad.l - 6}" y="${y0 + 3}" fill="#aaa" font-size="9" text-anchor="end" font-family="ui-monospace, monospace">0</text>
  `);

  // 右軸：final 值
  const finalV = valid[valid.length - 1];
  const finalColor = finalV > 0 ? '#0b6b3a' : finalV < 0 ? '#8f2e2e' : '#888';
  svg.insertAdjacentHTML('beforeend', `
    <text x="${W - pad.r + 4}" y="${y(finalV) + 3}" fill="${finalColor}" font-size="10" font-family="ui-monospace, monospace">${(finalV > 0 ? '+' : '') + fmtAxis(finalV)}</text>
  `);

  // 上方 label 行
  const peakV = Math.max(...valid);
  const troughV = Math.min(...valid);
  const finalCls = finalV > 0 ? 'gain' : finalV < 0 ? 'loss' : '';
  label.innerHTML = `
    <span>累計損益 · shares × close - 累計成本</span>
    <span>峰值 <span class="mono">${(peakV >= 0 ? '+' : '') + fmtAxis(peakV)}</span> · 谷值 <span class="mono">${(troughV >= 0 ? '+' : '') + fmtAxis(troughV)}</span> · 目前 <span class="mono final ${finalCls}">${(finalV > 0 ? '+' : '') + fmtAxis(finalV)}</span></span>
  `;
}

function drawDetailChart(s, code, isExited = false) {
  const svg = $('detail-chart');
  svg.innerHTML = '';
  if (!s.length) return;
  const W = svg.clientWidth || 800, H = 220;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  // Right padding larger：內側放張數軸，外側放股價軸
  const pad = { l: 44, r: 72, t: 12, b: 24 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;

  const maxW = Math.max(...s.map(x => x.weight));
  const minW = 0;
  const n = s.length;
  const x = i => pad.l + (i / Math.max(n - 1, 1)) * w;
  const y = v => pad.t + (1 - (v - minW) / (maxW - minW || 1)) * h;

  const ticks = 4;
  for (let i = 0; i <= ticks; i++) {
    const v = (maxW / ticks) * i;
    const yy = y(v);
    svg.insertAdjacentHTML('beforeend', `
      <line x1="${pad.l}" x2="${W - pad.r}" y1="${yy}" y2="${yy}" stroke="#eee" stroke-width="1"/>
      <text x="${pad.l - 6}" y="${yy + 3}" fill="#888" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">${v.toFixed(1)}%</text>
    `);
  }

  // ===== Lots overlay (right-inner axis, 張數) =====
  // 張 = shares / 1000；變動才是 ground truth（權重被股價 confound）
  const lotsPts = s.map((p, i) => ({ i, lots: typeof p.shares === 'number' ? p.shares / 1000 : null }))
                   .filter(pt => pt.lots !== null);
  if (lotsPts.length >= 2) {
    const ls = lotsPts.map(p => p.lots);
    const lMax = Math.max(...ls), lMin = Math.min(...ls);
    const lRange = lMax - lMin || 1;
    const ly = v => pad.t + (1 - (v - lMin) / lRange) * h;
    // 張數走勢用 stepped line 比較貼近現實（整數張數 discrete 變動）
    let d = '';
    for (let k = 0; k < lotsPts.length; k++) {
      const pt = lotsPts[k];
      if (k === 0) d += `M${x(pt.i).toFixed(1)},${ly(pt.lots).toFixed(1)} `;
      else {
        const prev = lotsPts[k - 1];
        d += `L${x(pt.i).toFixed(1)},${ly(prev.lots).toFixed(1)} L${x(pt.i).toFixed(1)},${ly(pt.lots).toFixed(1)} `;
      }
    }
    svg.insertAdjacentHTML('beforeend', `<path d="${d.trim()}" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.9"/>`);
    // Right-inner axis labels
    svg.insertAdjacentHTML('beforeend', `
      <text x="${W - pad.r + 4}" y="${ly(lMax) + 3}" fill="#4a6fa5" font-size="10" font-family="ui-monospace, monospace">${Math.round(lMax).toLocaleString()}</text>
      <text x="${W - pad.r + 4}" y="${ly(lMin) + 3}" fill="#4a6fa5" font-size="10" font-family="ui-monospace, monospace">${Math.round(lMin).toLocaleString()}</text>
      <text x="${W - pad.r + 4}" y="${pad.t - 2}" fill="#4a6fa5" font-size="9" font-family="ui-monospace, monospace">張</text>
    `);
  }

  // ===== Price overlay (right axis) =====
  const priceSeries = prices[code] || [];
  // Map weight series dates to price by date lookup
  const priceByDate = new Map(priceSeries.map(p => [p.date, p.close]));
  const pricePts = s.map((p, i) => ({ i, price: priceByDate.get(p.date) ?? null }))
                    .filter(pt => pt.price !== null);

  if (pricePts.length >= 2) {
    const prs = pricePts.map(p => p.price);
    const pMax = Math.max(...prs), pMin = Math.min(...prs);
    const pRange = pMax - pMin || 1;
    const py = v => pad.t + (1 - (v - pMin) / pRange) * h;
    // Price path (thin gray)
    let d = '';
    for (let k = 0; k < pricePts.length; k++) {
      const pt = pricePts[k];
      d += `${k === 0 ? 'M' : 'L'}${x(pt.i).toFixed(1)},${py(pt.price).toFixed(1)} `;
    }
    svg.insertAdjacentHTML('beforeend', `<path d="${d.trim()}" fill="none" stroke="#b08968" stroke-width="1" stroke-dasharray="2,2" opacity="0.75"/>`);
    // Right-outer axis labels (股價 NT$)
    svg.insertAdjacentHTML('beforeend', `
      <text x="${W - 4}" y="${py(pMax) + 3}" fill="#b08968" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">${pMax.toFixed(pMax >= 100 ? 0 : 1)}</text>
      <text x="${W - 4}" y="${py(pMin) + 3}" fill="#b08968" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">${pMin.toFixed(pMin >= 100 ? 0 : 1)}</text>
      <text x="${W - 4}" y="${pad.t - 2}" fill="#b08968" font-size="9" text-anchor="end" font-family="ui-monospace, monospace">NT$</text>
    `);
  } else if (!pricesJson) {
    // prices JSON not loaded at all — silently skip
  } else {
    svg.insertAdjacentHTML('beforeend', `
      <text x="${W - pad.r}" y="${pad.t + 10}" fill="#b08968" font-size="10" font-family="ui-monospace, monospace" text-anchor="end">股價無資料</text>
    `);
  }

  // ===== Weight line (primary, on top) =====
  const path = s.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(i).toFixed(1)},${y(p.weight).toFixed(1)}`).join(' ');
  svg.insertAdjacentHTML('beforeend', `<path d="${path}" fill="none" stroke="#1a1a1a" stroke-width="1.25"/>`);

  const events = detectEvents(s, code, isExited);
  for (const e of events) {
    const i = s.findIndex(x => x.date === e.date);
    if (i < 0) continue;
    const color = {ENTRY:'#0b6b3a', ADD:'#6ab04c', REDUCE:'#e17055', EXIT:'#8f2e2e', PEAK:'#2d3436'}[e.type] || '#999';
    svg.insertAdjacentHTML('beforeend', `<circle cx="${x(i).toFixed(1)}" cy="${y(e.weight).toFixed(1)}" r="3.2" fill="${color}" stroke="white" stroke-width="1.2"/>`);
  }

  svg.insertAdjacentHTML('beforeend', `
    <text x="${pad.l}" y="${H - 6}" font-size="10" fill="#888" font-family="ui-monospace, monospace">${fmt(s[0].date)}</text>
    <text x="${W - pad.r}" y="${H - 6}" font-size="10" fill="#888" font-family="ui-monospace, monospace" text-anchor="end">${fmt(s[s.length-1].date)}</text>
  `);
}

// ============= P&L ranking tab =============
// 所有有股價的倉位（current + exited）依實際賺賠金額排序。
// 研究動機：單股 detail 一次只看一檔、holdings 表只看目前持股。
// 排行這層做兩件事：
//   (1) 贏最多 / 虧最多一眼看到極值，知道 ETF 損益集中在哪幾檔
//   (2) exited 倉位也進榜 —— 經理人已實現的賺賠同樣反映擇時能力
(function renderPnlRanking() {
  const wrap = $('pnl-rank-wrap');
  const title = $('pnl-title');
  const countEl = $('count-pnl');
  const pnlAll = data.pnl || {};

  const currentSet = new Set(data.current.map(c => c.code));
  const rows = Object.entries(pnlAll)
    .filter(([_, v]) => v.has_prices && v.pnl != null)
    .map(([code, v]) => ({
      code,
      name: data.name_of[code] || code,
      pnl: v.pnl,
      pct: v.pnl_pct,
      cost: v.cost_basis,
      exited: !currentSet.has(code),
    }))
    // 過濾噪音：|pnl| < 100 萬 當作持倉太小（e.g. 微減倉殘留）
    .filter(r => Math.abs(r.pnl) >= 1e6);

  countEl.textContent = rows.length || '';

  if (rows.length === 0) {
    title.textContent = '此 ETF 暫無可計算的 P&L 排行';
    wrap.innerHTML = '<div class="empty" style="font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-soft);">（全海外/期貨倉位，或 FinMind 無股價資料）</div>';
    return;
  }

  const gains = rows.filter(r => r.pnl > 0).sort((a, b) => b.pnl - a.pnl);
  const losses = rows.filter(r => r.pnl < 0).sort((a, b) => a.pnl - b.pnl);

  const sumGain = gains.reduce((s, r) => s + r.pnl, 0);
  const sumLoss = losses.reduce((s, r) => s + r.pnl, 0);
  const net = sumGain + sumLoss;

  const fmtNT = v => {
    const abs = Math.abs(v);
    if (abs >= 1e8) return (v / 1e8).toFixed(2) + '億';
    if (abs >= 1e4) return (v / 1e4).toFixed(0) + '萬';
    return Math.round(v).toLocaleString();
  };
  const fmtSigned = v => (v > 0 ? '+' : '') + fmtNT(v);
  const fmtPct = v => (v == null ? '—' : (v > 0 ? '+' : '') + v.toFixed(1) + '%');

  title.innerHTML = `
    所有 TW 持股（含已出清）依單股 P&L 排序 ·
    贏 <span class="mono">${gains.length}</span> 檔合計 <span class="mono" style="color:var(--accent)">${fmtSigned(sumGain)}</span> ·
    虧 <span class="mono">${losses.length}</span> 檔合計 <span class="mono" style="color:var(--accent-down)">${fmtSigned(sumLoss)}</span> ·
    淨 <span class="mono" style="color:${net >= 0 ? 'var(--accent)' : 'var(--accent-down)'}">${fmtSigned(net)}</span>
  `;

  function card(r) {
    const cls = r.pnl > 0 ? 'gain' : 'loss';
    const pctCls = r.pct == null ? '' : r.pct > 0 ? 'gain' : 'loss';
    const exitTag = r.exited ? '<span class="tag-exit">已出清</span>' : '';
    return `
      <div class="pnl-rank-card ${cls}${r.exited ? ' exited' : ''}" data-code="${r.code}">
        <div class="head">
          <span class="name">${r.name}${exitTag}</span>
          <span class="code">${r.code}</span>
        </div>
        <div class="amt">${fmtSigned(r.pnl)}</div>
        <div class="meta">
          <span class="pct ${pctCls}">${fmtPct(r.pct)}</span>
          <span>成本 ${fmtNT(r.cost)}</span>
        </div>
      </div>`;
  }

  function section(label, items, nTotal) {
    const body = items.length
      ? `<div class="pnl-rank-grid">${items.map(card).join('')}</div>`
      : `<div class="empty">—</div>`;
    return `<div class="pnl-rank-section"><h3>${label}<span class="n-total">${nTotal}</span></h3>${body}</div>`;
  }

  // 限制顯示 top 30，避免頁面太長（同類 30 檔後通常 signal 已稀薄）
  const TOPN = 30;
  wrap.innerHTML = [
    section('贏最多', gains.slice(0, TOPN), gains.length),
    section('虧最多', losses.slice(0, TOPN), losses.length),
  ].join('');

  wrap.addEventListener('click', ev => {
    const card = ev.target.closest('.pnl-rank-card');
    if (!card) return;
    const code = card.dataset.code;
    if (data.series && data.series[code]) {
      selectStock(code); switchTab('stock');
    }
  });
})();

// ============= Exited strip =============
const exitedStrip = $('exited-strip');
const exitDate = data.exit_date || {};
const activeDays = data.active_days || {};
for (const code of data.exited_codes) {
  const name = data.name_of[code] || code;
  const ed = exitDate[code];
  const ad = activeDays[code];
  const meta = ed ? `${fmt(ed)} 出清 · ${ad} 天` : `${data.days_held[code]} 天曾持`;
  const div = document.createElement('div');
  div.className = 'e';
  div.style.cursor = 'pointer';
  div.innerHTML = `<span class="code">${code}</span><span class="n">${name}</span><span class="d">${meta}</span>`;
  div.onclick = () => { selectStock(code); switchTab('stock'); };
  exitedStrip.appendChild(div);
}

// ============= Helpers =============
function renderSparkline(s, w, h, opts = {}) {
  if (!s.length) return `<svg width="${w}" height="${h}"></svg>`;
  const pad = 2;
  const weights = s.map(x => x.weight);
  const maxW = Math.max(...weights);
  const minW = Math.min(...weights);
  const range = maxW - minW || 1;
  const n = s.length;
  const px = i => pad + (i / Math.max(n - 1, 1)) * (w - pad * 2);
  const py = v => pad + (1 - (v - minW) / range) * (h - pad * 2);
  const path = s.map((p, i) => `${i === 0 ? 'M' : 'L'}${px(i).toFixed(1)},${py(p.weight).toFixed(1)}`).join(' ');
  const lastX = px(n - 1), lastY = py(s[n - 1].weight);
  const dot = opts.showDot !== false
    ? `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="1.8" fill="#1a1a1a"/>`
    : '';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="${path}" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    ${dot}
  </svg>`;
}

function deltaDays(s, days) {
  if (s.length < 2) return null;
  const last = s[s.length - 1];
  const target = s[Math.max(0, s.length - 1 - days)];
  if (!target) return null;
  return last.weight - target.weight;
}

// Init detail with first stock
selectStock((mainHoldings[0] || data.current[0]).code);
</script>
