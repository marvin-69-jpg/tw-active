function drawChart(svgId, data, yKey, color, annotations) {
  const svg = document.getElementById(svgId);
  const W = svg.parentElement.clientWidth - 40;
  const H = parseInt(svg.getAttribute('height'));
  const pad = { top: 16, right: 20, bottom: 30, left: 48 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;
  svg.setAttribute('width', W);

  const vals = data.map(d => d[yKey]);
  const minV = 0, maxV = Math.max(...vals) * 1.05;
  
  const x = (i) => pad.left + (i / (data.length - 1)) * w;
  const y = (v) => pad.top + h - (v - minV) / (maxV - minV) * h;

  let svgContent = '';
  
  // Grid lines
  const nGrid = 4;
  for (let i = 0; i <= nGrid; i++) {
    const v = minV + (maxV - minV) * i / nGrid;
    const yp = y(v);
    svgContent += `<line x1="${pad.left}" y1="${yp}" x2="${pad.left + w}" y2="${yp}" stroke="#eee" stroke-width="1"/>`;
    svgContent += `<text x="${pad.left - 4}" y="${yp + 3.5}" text-anchor="end" font-size="10" fill="#aaa" font-family="ui-monospace,monospace">${v.toFixed(yKey==='w'?1:0)}</text>`;
  }
  
  // Key date markers (4/8, 4/21)
  const keyMarkers = [
    {d: '20260408', label: '4/8 起漲', yOff: 11},
    {d: '20260421', label: '4/21 漲停', yOff: 26},
  ];
  for (const {d: kd, label, yOff} of keyMarkers) {
    const idx = data.findIndex(d => d.d >= kd);
    if (idx >= 0) {
      const xp = x(idx);
      svgContent += `<line x1="${xp}" y1="${pad.top}" x2="${xp}" y2="${pad.top + h}" stroke="#e84343" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>`;
      const lx = xp > pad.left + w - 80 ? xp - 3 : xp + 3;
      const anchor = xp > pad.left + w - 80 ? 'end' : 'start';
      svgContent += `<text x="${lx}" y="${pad.top + yOff}" text-anchor="${anchor}" font-size="10" fill="#e84343" font-family="ui-monospace,monospace">${label}</text>`;
    }
  }
  
  // Line path
  const points = data.map((d, i) => `${x(i)},${y(d[yKey])}`).join(' ');
  svgContent += `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round"/>`;
  
  // Dots for key dates
  ['20260407','20260414','20260417','20260421'].forEach(kd => {
    const idx = data.findIndex(d => d.d === kd);
    if (idx >= 0) {
      const xp = x(idx), yp = y(data[idx][yKey]);
      svgContent += `<circle cx="${xp}" cy="${yp}" r="3.5" fill="${color}"/>`;
    }
  });
  
  // X axis labels (monthly)
  const months = {};
  data.forEach((d, i) => {
    const ym = d.d.slice(0, 6);
    if (!months[ym]) { months[ym] = i; }
  });
  for (const [ym, i] of Object.entries(months)) {
    const xp = x(i);
    const label = ym.slice(4) === '01' ? ym.slice(0,4)+'/'+ym.slice(4) : ym.slice(4)+'/';
    svgContent += `<text x="${xp}" y="${pad.top + h + 18}" text-anchor="middle" font-size="10" fill="#aaa" font-family="ui-monospace,monospace">${label}</text>`;
  }
  
  svg.innerHTML = svgContent;
}
