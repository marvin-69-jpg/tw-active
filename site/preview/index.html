<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tw-active preview</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --paper: #fafaf7;
    --panel: #fff;
    --rule: #e0ddd2;
    --rule-strong: #1a1a1a;
    --accent: #f2b705;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    background: var(--paper);
    color: var(--ink);
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 48px;
    font-size: 14px;
    line-height: 1.55;
  }
  .crumb { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .crumb a { color: var(--ink-soft); text-decoration: none; }
  h1 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em;
  }
  .sub { color: var(--ink-soft); font-size: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--rule-strong); }
  .sub .mono { font-family: ui-monospace, monospace; }
  .sub .sep { margin: 0 6px; color: var(--rule); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 14px 12px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.12s;
  }
  .card:hover { border-color: var(--rule-strong); }
  .card .code-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .card .code {
    font-family: ui-monospace, monospace;
    font-weight: 600; font-size: 15px;
  }
  .card .issuer {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 11px; color: var(--ink-soft);
  }
  .card .name {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 13px; font-weight: 500; margin-bottom: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    font-size: 10px; color: var(--ink-soft);
    padding: 8px 0; border-top: 1px dashed var(--rule); border-bottom: 1px dashed var(--rule);
    margin-bottom: 10px;
  }
  .card .stats .v {
    font-family: ui-monospace, monospace;
    font-size: 14px; color: var(--ink); font-weight: 500; display: block; margin-top: 1px;
  }
  .card .stats .new .v { color: #b8860b; }
  .card .top3 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 11px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .card .top3 .row {
    display: flex; justify-content: space-between; gap: 8px;
    white-space: nowrap; overflow: hidden;
  }
  .card .top3 .n { text-overflow: ellipsis; overflow: hidden; }
  .card .top3 .w { font-family: ui-monospace, monospace; color: var(--ink); }
  .card .asof {
    font-size: 10px; color: var(--ink-soft); margin-top: 10px;
    font-family: ui-monospace, monospace;
  }

  .empty { color: var(--ink-soft); padding: 40px 0; text-align: center; }

  @media (max-width: 640px) {
    body { padding: 20px 12px 32px; font-size: 13px; }
    h1 { font-size: 18px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .card { padding: 12px; }
  }

  footer {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft); font-size: 11px;
  }
</style>
</head>
<body>
<div class="crumb"><a href="../">tw-active</a> / preview</div>
<h1>主動型 ETF · 持股軌跡</h1>
<div class="sub" id="sub">—</div>

<div class="grid" id="grid"></div>

<footer id="footer">—</footer>

<script type="module">
const fmt = d => d ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : '—';
const $ = id => document.getElementById(id);

const idx = await fetch('./etfs.json').then(r => r.json());
const etfs = idx.etfs || [];

$('sub').innerHTML = `
  <span class="mono">${idx.n_etfs}</span> 檔主動 ETF
  <span class="sep">·</span>
  as-of <span class="mono">${fmt(idx.as_of)}</span>
  <span class="sep">·</span>
  每檔點入看目前持股 / 歷史軌跡 / 單股進出場 / 已出清
`;

const grid = $('grid');
if (!etfs.length) {
  grid.innerHTML = '<div class="empty">尚無資料</div>';
} else {
  for (const e of etfs) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `./etf.html?code=${e.code}`;
    const top3Html = (e.top3 || []).map(h =>
      `<div class="row"><span class="n">${h.code} ${h.name}</span><span class="w">${h.weight.toFixed(2)}%</span></div>`
    ).join('');
    const newCell = e.n_new > 0
      ? `<div class="new"><span>NEW</span><span class="v">${e.n_new}</span></div>`
      : `<div><span>NEW</span><span class="v">—</span></div>`;
    a.innerHTML = `
      <div class="code-row">
        <span class="code">${e.code}</span>
        <span class="issuer">${e.issuer || ''}</span>
      </div>
      <div class="name">${e.name}</div>
      <div class="stats">
        <div><span>主要持股</span><span class="v">${e.n_main}</span></div>
        <div><span>全倉</span><span class="v">${e.n_current}</span></div>
        ${newCell}
        <div><span>已出清</span><span class="v">${e.n_exited}</span></div>
      </div>
      <div class="top3">${top3Html || '—'}</div>
      <div class="asof">${e.n_days} 個交易日 · ${fmt(e.first_date)} → ${fmt(e.as_of)}</div>
    `;
    grid.appendChild(a);
  }
}

$('footer').textContent = `data etfs.json · 索引 ${etfs.length} 檔 · 每檔持股單獨 <code>.json</code>`;
</script>
</body>
</html>
