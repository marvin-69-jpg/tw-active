<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tw-active · 主動 ETF 導航</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --paper: #fafaf7;
    --panel: #fff;
    --rule: #e0ddd2;
    --rule-strong: #1a1a1a;
    --up: #b8860b;
    --down: #4a7c4a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    background: var(--paper);
    color: var(--ink);
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 48px;
    font-size: 13px;
    line-height: 1.55;
  }
  h1 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 20px; font-weight: 600; margin: 0 0 4px;
  }
  .sub {
    color: var(--ink-soft); font-size: 12px;
    padding-bottom: 12px; margin-bottom: 16px;
    border-bottom: 1px solid var(--rule-strong);
  }
  .sub .mono { font-family: ui-monospace, monospace; }

  .sort-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px; font-size: 12px; color: var(--ink-soft);
  }
  .sort-bar select {
    font-family: ui-monospace, monospace; font-size: 12px;
    background: var(--panel); border: 1px solid var(--rule);
    padding: 3px 7px; color: var(--ink); cursor: pointer;
  }

  ul.list { list-style: none; padding: 0; margin: 0; }
  ul.list li { border-top: 1px solid var(--rule); }
  ul.list li:last-child { border-bottom: 1px solid var(--rule); }
  a.row {
    display: grid;
    grid-template-columns: 60px 1fr 90px 90px 80px;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    text-decoration: none; color: inherit;
    transition: background 0.08s;
  }
  a.row:hover { background: var(--panel); }
  .code { font-family: ui-monospace, monospace; font-weight: 600; }
  .name {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .name .issuer { color: var(--ink-soft); font-size: 11px; margin-left: 6px; }
  .aum { font-family: ui-monospace, monospace; text-align: right; color: var(--ink-soft); }
  .aum .v { color: var(--ink); }
  .list-date { font-family: ui-monospace, monospace; font-size: 11px; color: var(--ink-soft); }
  .spark { width: 80px; height: 24px; display: block; }
  .spark polyline { fill: none; stroke-width: 1.2; }
  .spark.up polyline { stroke: var(--up); }
  .spark.down polyline { stroke: var(--down); }
  .spark.flat polyline { stroke: var(--ink-soft); }

  .empty { color: var(--ink-soft); padding: 40px 0; text-align: center; }
  footer {
    margin-top: 32px; padding-top: 12px; border-top: 1px solid var(--rule);
    color: var(--ink-soft); font-size: 11px;
  }

  @media (max-width: 640px) {
    body { padding: 18px 12px 32px; }
    h1 { font-size: 17px; }
    a.row {
      grid-template-columns: 54px 1fr 60px 60px;
      gap: 8px;
      padding: 10px 2px;
    }
    a.row .list-date { display: none; }
    .name { font-size: 12px; }
    .name .issuer { display: block; margin-left: 0; margin-top: 2px; }
  }
</style>
</head>
<body>
<h1>tw-active · 主動型 ETF</h1>
<div class="sub" id="sub">—</div>

<div class="sort-bar">
  <label for="sort">排序</label>
  <select id="sort">
    <option value="aum">規模</option>
    <option value="code">代號</option>
    <option value="listing">上市日（新 → 舊）</option>
    <option value="price_chg">近期漲跌</option>
  </select>
  <span style="margin-left:auto;font-size:11px;color:var(--ink-soft)">點任一檔進入單檔深度頁</span>
</div>

<ul class="list" id="list"></ul>

<footer id="footer">—</footer>

<script type="module">
const fmt = d => d ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : '—';
const $ = id => document.getElementById(id);

const idx = await fetch(`./etfs.json?v=${Date.now()}`, { cache: 'no-cache' }).then(r => r.json());
const etfs = idx.etfs || [];

const totalAum = etfs.reduce((s, e) => s + (e.total_av_yi || 0), 0);
$('sub').innerHTML = `
  <span class="mono">${idx.n_etfs}</span> 檔 ·
  合計規模 <span class="mono">${totalAum.toFixed(0)}</span> 億 NT$ ·
  as-of <span class="mono">${fmt(idx.as_of)}</span>
`;

const fmtAum = v => v == null ? '—' : (v >= 1000 ? v.toFixed(0) : v.toFixed(1));

function pricePct(e) {
  const s = e.price_series || [];
  if (s.length < 2) return null;
  return (s[s.length - 1].c - s[0].c) / s[0].c * 100;
}

function renderSpark(series) {
  if (!series || series.length < 2) return '';
  const vals = series.map(p => p.c);
  const w = 80, h = 24, pad = 2;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const delta = (vals[vals.length - 1] - vals[0]) / vals[0] * 100;
  const cls = delta > 0.2 ? 'up' : (delta < -0.2 ? 'down' : 'flat');
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - 2 * pad);
    const y = pad + (1 - (v - min) / range) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="spark ${cls}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}"/>
  </svg>`;
}

const list = $('list');
function render(sortKey) {
  const sorters = {
    aum:       (a, b) => (b.total_av_yi || 0) - (a.total_av_yi || 0) || a.code.localeCompare(b.code),
    code:      (a, b) => a.code.localeCompare(b.code),
    listing:   (a, b) => (b.listing_date || '').localeCompare(a.listing_date || '') || a.code.localeCompare(b.code),
    price_chg: (a, b) => {
      const pa = pricePct(a), pb = pricePct(b);
      if (pa == null && pb == null) return a.code.localeCompare(b.code);
      if (pa == null) return 1;
      if (pb == null) return -1;
      return pb - pa || a.code.localeCompare(b.code);
    },
  };
  const sorted = [...etfs].sort(sorters[sortKey] || sorters.aum);
  list.innerHTML = '';
  if (!sorted.length) { list.innerHTML = '<li class="empty">尚無資料</li>'; return; }
  for (const e of sorted) {
    const li = document.createElement('li');
    const pct = pricePct(e);
    const pctStr = pct == null ? '—' : `${pct > 0 ? '+' : ''}${pct.toFixed(1)}%`;
    const pctCls = pct == null ? '' : (pct > 0.2 ? 'up' : (pct < -0.2 ? 'down' : 'flat'));
    li.innerHTML = `
      <a class="row" href="./etf.html?code=${e.code}">
        <span class="code">${e.code}</span>
        <span class="name">${e.name}<span class="issuer">${e.issuer || ''}</span></span>
        <span class="aum"><span class="v">${fmtAum(e.total_av_yi)}</span> 億</span>
        ${renderSpark(e.price_series)}
        <span class="list-date" title="上市日">${e.listing_date || '—'}</span>
      </a>`;
    list.appendChild(li);
  }
}

const sortSel = $('sort');
const initSort = (location.hash || '#aum').slice(1);
if (sortSel.querySelector(`option[value="${initSort}"]`)) sortSel.value = initSort;
sortSel.addEventListener('change', () => {
  location.hash = sortSel.value;
  render(sortSel.value);
});
render(sortSel.value);

$('footer').textContent = `${etfs.length} 檔主動 ETF · 規模 FundClear · 走勢 TWSE/TPEx 近 ~3M · 點一檔進單檔深度`;
</script>
</body>
</html>
