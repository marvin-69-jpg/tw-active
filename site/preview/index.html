<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tw-active preview</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --paper: #fafaf7;
    --panel: #fff;
    --rule: #e0ddd2;
    --rule-strong: #1a1a1a;
    --accent: #f2b705;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    background: var(--paper);
    color: var(--ink);
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 48px;
    font-size: 14px;
    line-height: 1.55;
  }
  .crumb { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .crumb a { color: var(--ink-soft); text-decoration: none; }
  h1 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em;
  }
  .sub { color: var(--ink-soft); font-size: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--rule-strong); }
  .sub .mono { font-family: ui-monospace, monospace; }
  .sub .sep { margin: 0 6px; color: var(--rule); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 14px 14px 12px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.12s;
  }
  .card:hover { border-color: var(--rule-strong); }
  .card .code-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .card .code {
    font-family: ui-monospace, monospace;
    font-weight: 600; font-size: 15px;
  }
  .card .issuer {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 11px; color: var(--ink-soft);
  }
  .card .name {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 13px; font-weight: 500; margin-bottom: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .size-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 8px 0; border-top: 1px dashed var(--rule);
    margin-bottom: 0;
  }
  .card .size-row .size {
    font-family: ui-monospace, monospace;
    font-size: 18px; font-weight: 600; color: var(--ink);
  }
  .card .size-row .size-unit { font-size: 11px; color: var(--ink-soft); margin-left: 2px; }
  .card .size-row .benefit {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 11px; color: var(--ink-soft);
    margin-left: auto;
  }
  .card .size-row .benefit .mono { font-family: ui-monospace, monospace; color: var(--ink); }
  .card .price-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 6px 0; border-top: 1px dashed var(--rule);
    font-size: 11px; color: var(--ink-soft);
  }
  .card .price-row .label { font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif; }
  .card .price-row .price, .card .price-row .nav {
    font-family: ui-monospace, monospace; color: var(--ink); font-weight: 500;
  }
  .card .price-row .prem { margin-left: auto; font-family: ui-monospace, monospace; font-weight: 500; }
  .card .price-row .prem.pos { color: #b8860b; }
  .card .price-row .prem.neg { color: #4a7c4a; }
  .card .price-row .prem.na { color: var(--ink-soft); font-weight: normal; }
  .card .spark {
    display: block; width: 100%; height: 36px;
    margin: 6px 0 4px;
  }
  .card .spark polyline { fill: none; stroke-width: 1.2; }
  .card .spark.up polyline { stroke: #b8860b; }
  .card .spark.down polyline { stroke: #4a7c4a; }
  .card .spark.flat polyline { stroke: var(--ink-soft); }
  .card .spark .base { stroke: var(--rule); stroke-width: 0.5; stroke-dasharray: 2 2; }
  .card .spark-meta {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--ink-soft);
    font-family: ui-monospace, monospace;
    margin-bottom: 6px;
  }
  .card .spark-meta .delta.pos { color: #b8860b; }
  .card .spark-meta .delta.neg { color: #4a7c4a; }
  .card .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    font-size: 10px; color: var(--ink-soft);
    padding: 8px 0; border-top: 1px dashed var(--rule); border-bottom: 1px dashed var(--rule);
    margin-bottom: 10px;
  }
  .card .stats .v {
    font-family: ui-monospace, monospace;
    font-size: 14px; color: var(--ink); font-weight: 500; display: block; margin-top: 1px;
  }
  .card .stats .new .v { color: #b8860b; }

  .sort-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 16px 0 20px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .sort-bar label { font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif; }
  .sort-bar select {
    font-family: ui-monospace, monospace; font-size: 12px;
    background: var(--panel); border: 1px solid var(--rule);
    padding: 4px 8px; color: var(--ink); cursor: pointer;
  }
  .sort-bar select:focus { outline: 1px solid var(--rule-strong); }
  .card .top3 {
    font-family: ui-sans-serif, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
    font-size: 11px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .card .top3 .row {
    display: flex; justify-content: space-between; gap: 8px;
    white-space: nowrap; overflow: hidden;
  }
  .card .top3 .n { text-overflow: ellipsis; overflow: hidden; }
  .card .top3 .w { font-family: ui-monospace, monospace; color: var(--ink); }
  .card .asof {
    font-size: 10px; color: var(--ink-soft); margin-top: 10px;
    font-family: ui-monospace, monospace;
  }

  .empty { color: var(--ink-soft); padding: 40px 0; text-align: center; }

  @media (max-width: 640px) {
    body { padding: 20px 12px 32px; font-size: 13px; }
    h1 { font-size: 18px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .card { padding: 12px; }
  }

  footer {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft); font-size: 11px;
  }
</style>
</head>
<body>
<div class="crumb"><a href="../">tw-active</a> / preview</div>
<h1>主動型 ETF · 持股軌跡</h1>
<div class="sub" id="sub">—</div>

<div class="sort-bar">
  <label for="sort">排序：</label>
  <select id="sort">
    <option value="aum">規模（大 → 小）</option>
    <option value="benefit">受益人數（多 → 少）</option>
    <option value="code">代號</option>
    <option value="n_days">資料長度（長 → 短）</option>
    <option value="n_current">持股數（多 → 少）</option>
    <option value="n_new">NEW 數（多 → 少）</option>
    <option value="n_exited">已出清（多 → 少）</option>
    <option value="premium">溢折價 |絕對值大 → 小|</option>
    <option value="price_chg">近期漲跌幅（漲 → 跌）</option>
  </select>
  <span style="margin-left:auto;font-size:11px">規模/收盤 FundClear · NAV 投信官網（5/21 檔） · 走勢 TWSE/TPEx 近 ~3M</span>
</div>

<div class="grid" id="grid"></div>

<footer id="footer">—</footer>

<script type="module">
const fmt = d => d ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : '—';
const $ = id => document.getElementById(id);

const idx = await fetch('./etfs.json').then(r => r.json());
const etfs = idx.etfs || [];

// 規模合計（億）
const totalAum = etfs.reduce((s, e) => s + (e.total_av_yi || 0), 0);
const totalBenefit = etfs.reduce((s, e) => s + (e.benefit || 0), 0);
$('sub').innerHTML = `
  <span class="mono">${idx.n_etfs}</span> 檔主動 ETF
  <span class="sep">·</span>
  合計規模 <span class="mono">${totalAum.toFixed(0)}</span> 億 NT$
  <span class="sep">·</span>
  合計受益人 <span class="mono">${totalBenefit.toLocaleString()}</span>
  <span class="sep">·</span>
  as-of <span class="mono">${fmt(idx.as_of)}</span>
`;

const fmtNum = n => n == null ? '—' : n.toLocaleString();
const fmtAum = v => {
  if (v == null) return '—';
  return v >= 1000 ? v.toFixed(0) : v.toFixed(1);
};

const grid = $('grid');
function render(sortKey) {
  const sorters = {
    aum:       (a, b) => (b.total_av_yi || 0) - (a.total_av_yi || 0) || a.code.localeCompare(b.code),
    benefit:   (a, b) => (b.benefit || 0) - (a.benefit || 0) || a.code.localeCompare(b.code),
    code:      (a, b) => a.code.localeCompare(b.code),
    n_days:    (a, b) => b.n_days - a.n_days || a.code.localeCompare(b.code),
    n_current: (a, b) => b.n_current - a.n_current || a.code.localeCompare(b.code),
    n_new:     (a, b) => b.n_new - a.n_new || a.code.localeCompare(b.code),
    n_exited:  (a, b) => b.n_exited - a.n_exited || a.code.localeCompare(b.code),
    premium:   (a, b) => {
      // NAV 未揭露 → 沉底
      const pa = a.premium_pct, pb = b.premium_pct;
      if (pa == null && pb == null) return a.code.localeCompare(b.code);
      if (pa == null) return 1;
      if (pb == null) return -1;
      return Math.abs(pb) - Math.abs(pa) || a.code.localeCompare(b.code);
    },
    price_chg: (a, b) => {
      // 近 ~3M 漲跌幅（起→末）
      const pct = e => {
        const s = e.price_series || [];
        if (s.length < 2) return null;
        return (s[s.length - 1].c - s[0].c) / s[0].c * 100;
      };
      const pa = pct(a), pb = pct(b);
      if (pa == null && pb == null) return a.code.localeCompare(b.code);
      if (pa == null) return 1;
      if (pb == null) return -1;
      return pb - pa || a.code.localeCompare(b.code);
    },
  };
  const sorted = [...etfs].sort(sorters[sortKey] || sorters.aum);
  grid.innerHTML = '';
  if (!sorted.length) { grid.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  for (const e of sorted) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `./etf.html?code=${e.code}`;
    const top3Html = (e.top3 || []).map(h =>
      `<div class="row"><span class="n">${h.code} ${h.name}</span><span class="w">${h.weight.toFixed(2)}%</span></div>`
    ).join('');
    const newCell = e.n_new > 0
      ? `<div class="new"><span>NEW</span><span class="v">${e.n_new}</span></div>`
      : `<div><span>NEW</span><span class="v">—</span></div>`;
    const aum = e.total_av_yi;
    const sizeRow = `<div class="size-row">
      <span class="size">${fmtAum(aum)}<span class="size-unit"> 億 NT$</span></span>
      <span class="benefit">受益人 <span class="mono">${fmtNum(e.benefit)}</span></span>
    </div>`;
    // Sparkline：近 ~3 個月日收盤
    const sp = (e.price_series || []).map(p => p.c);
    let sparkHtml = '';
    if (sp.length >= 2) {
      const w = 240, h = 36, pad = 2;
      const min = Math.min(...sp), max = Math.max(...sp);
      const range = max - min || 1;
      const startY = sp[0], endY = sp[sp.length - 1];
      const deltaPct = ((endY - startY) / startY) * 100;
      const dir = deltaPct > 0.2 ? 'up' : (deltaPct < -0.2 ? 'down' : 'flat');
      const pts = sp.map((v, i) => {
        const x = pad + (i / (sp.length - 1)) * (w - 2 * pad);
        const y = pad + (1 - (v - min) / range) * (h - 2 * pad);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      // 起點水平基準線
      const baseY = pad + (1 - (startY - min) / range) * (h - 2 * pad);
      const d1 = e.price_series[0].d, d2 = e.price_series[e.price_series.length - 1].d;
      const fmtShort = d => d ? `${d.slice(4,6)}/${d.slice(6,8)}` : '';
      const deltaCls = deltaPct > 0.2 ? 'pos' : (deltaPct < -0.2 ? 'neg' : '');
      const sign = deltaPct > 0 ? '+' : '';
      sparkHtml = `
        <svg class="spark ${dir}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <line class="base" x1="0" y1="${baseY.toFixed(1)}" x2="${w}" y2="${baseY.toFixed(1)}"/>
          <polyline points="${pts}"/>
        </svg>
        <div class="spark-meta">
          <span>${fmtShort(d1)} → ${fmtShort(d2)} · ${sp.length}d</span>
          <span class="delta ${deltaCls}">${sign}${deltaPct.toFixed(1)}%</span>
        </div>`;
    } else {
      sparkHtml = `<div class="spark-meta"><span>走勢資料不足</span></div>`;
    }
    // 價格列：收盤（FundClear） + NAV（5/21 有）+ 溢折價 %
    const close = e.close_price;
    const nav = e.nav;
    const prem = e.premium_pct;
    let premCell;
    if (prem == null) {
      premCell = `<span class="prem na" title="NAV 未揭露（投信官網無公開 API）">—</span>`;
    } else {
      const cls = prem > 0 ? 'pos' : (prem < 0 ? 'neg' : '');
      const sign = prem > 0 ? '+' : '';
      premCell = `<span class="prem ${cls}" title="溢折價 = (收盤 − NAV) / NAV">${sign}${prem.toFixed(2)}%</span>`;
    }
    const priceRow = `<div class="price-row">
      <span class="label">收盤</span><span class="price">${close != null ? close.toFixed(2) : '—'}</span>
      <span class="label">NAV</span><span class="nav">${nav != null ? nav.toFixed(2) : '—'}</span>
      ${premCell}
    </div>`;
    a.innerHTML = `
      <div class="code-row">
        <span class="code">${e.code}</span>
        <span class="issuer">${e.issuer || ''}</span>
      </div>
      <div class="name">${e.name}</div>
      ${sizeRow}
      ${sparkHtml}
      ${priceRow}
      <div class="stats">
        <div><span>主要持股</span><span class="v">${e.n_main}</span></div>
        <div><span>全倉</span><span class="v">${e.n_current}</span></div>
        ${newCell}
        <div><span>已出清</span><span class="v">${e.n_exited}</span></div>
      </div>
      <div class="top3">${top3Html || '—'}</div>
      <div class="asof">${e.n_days} 個交易日 · ${fmt(e.first_date)} → ${fmt(e.as_of)}</div>
    `;
    grid.appendChild(a);
  }
}

const sortSel = $('sort');
const initSort = (location.hash || '#aum').slice(1);
if (sortSel.querySelector(`option[value="${initSort}"]`)) sortSel.value = initSort;
sortSel.addEventListener('change', () => {
  location.hash = sortSel.value;
  render(sortSel.value);
});
render(sortSel.value);

const navCnt = etfs.filter(e => e.nav != null).length;
$('footer').textContent = `data etfs.json · 索引 ${etfs.length} 檔 · 規模/收盤 FundClear · NAV ${navCnt}/${etfs.length} 檔（僅群益+安聯投信官網有公開 API，其他需手動 scrape）`;
</script>
</body>
</html>
